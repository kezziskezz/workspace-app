    }
    const stored=parseInt(localStorage.getItem('ws_sidebar_width')||'0',10);
    if(stored>=SIDEBAR_MIN&&stored<=SIDEBAR_MAX){
      document.documentElement.style.setProperty('--sidebar-width',stored+'px');
    }else{
      document.documentElement.style.removeProperty('--sidebar-width');
    }
  }
  applySidebarWidth();
  window.addEventListener('resize',applySidebarWidth);

  let sbResizing=false, sbStartX=0, sbStartW=0;
  $('sidebarResizeHandle').addEventListener('mousedown',e=>{
    if(window.innerWidth<=768)return;
    if(state.sidebarCollapsed)return;
    sbResizing=true;
    sbStartX=e.clientX;
    sbStartW=parseInt(getComputedStyle(sidebar).width,10)||248;
    document.body.classList.add('resizing-sidebar');
    $('sidebarResizeHandle').classList.add('resizing');
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!sbResizing)return;
    const newW=Math.min(SIDEBAR_MAX,Math.max(SIDEBAR_MIN,sbStartW+(e.clientX-sbStartX)));
    document.documentElement.style.setProperty('--sidebar-width',newW+'px');
  });
  document.addEventListener('mouseup',()=>{
    if(!sbResizing)return;
    sbResizing=false;
    document.body.classList.remove('resizing-sidebar');
    $('sidebarResizeHandle').classList.remove('resizing');
    const w=parseInt(getComputedStyle(sidebar).width,10);
    if(w>=SIDEBAR_MIN&&w<=SIDEBAR_MAX)localStorage.setItem('ws_sidebar_width',String(w));
  });
  // Double-click handle to reset to default
  $('sidebarResizeHandle').addEventListener('dblclick',()=>{
    localStorage.removeItem('ws_sidebar_width');
    document.documentElement.style.removeProperty('--sidebar-width');
    toast('Sidebar width reset');
  });

  // ============================================================
  // GLOBAL KEYBOARD SHORTCUTS
  // ============================================================
  document.addEventListener('keydown',e=>{
    // Cmd/Ctrl+K — search
    if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();searchOverlay.hidden?openSearch():closeSearch();return;}
    // Cmd/Ctrl+\ — toggle sidebar
    if((e.metaKey||e.ctrlKey)&&e.key==='\\'){e.preventDefault();toggleSidebar();return;}
    // Cmd/Ctrl+Shift+N — new page
    if((e.metaKey||e.ctrlKey)&&e.shiftKey&&e.key.toLowerCase()==='n'){e.preventDefault();createPage();return;}
    // Cmd/Ctrl+Shift+P — new from template
    if((e.metaKey||e.ctrlKey)&&e.shiftKey&&e.key.toLowerCase()==='p'){e.preventDefault();openTemplateModal();return;}
    // Esc — close modals
    if(e.key==='Escape'){
      if(!$('shortcutsOverlay').hidden){closeShortcutsModal();return;}
      if(!$('templateOverlay').hidden){closeTemplateModal();return;}
      if(!searchOverlay.hidden){closeSearch();return;}
      if(state.openTaskId){closeTaskDetail();return;}
      if(activePopover){closePopover();return;}
      if(slashMenuState){closeSlashMenu();return;}
      return;
    }
    // ? — show help (only when no input focused, no modifier)
    if(e.key==='?'&&!e.metaKey&&!e.ctrlKey&&!e.altKey&&!isTextInputFocused()){
      e.preventDefault();
      if($('shortcutsOverlay').hidden)openShortcutsModal();else closeShortcutsModal();
      return;
    }
  });

  // ============================================================
  // EVENT BINDINGS
  // ============================================================
  $('addPageBtn').addEventListener('click',()=>createPage());
  $('addTemplatePageBtn').addEventListener('click',()=>openTemplateModal());
  $('sidebarSearchBtn').addEventListener('click',openSearch);
  $('searchHeaderBtn').addEventListener('click',openSearch);
  $('shortcutsBtn').addEventListener('click',openShortcutsModal);
  document.querySelectorAll('[data-sysview]').forEach(btn=>btn.addEventListener('click',()=>{
    const view=btn.dataset.sysview;
    state.currentView=view;
    state.currentPageId=null;
    state.unsubBlocks?.();
    render();closeSidebarOnMobile();
  }));
  $('menuBtn').addEventListener('click',()=>confirmModal('Sign out?','You can sign back in at any time.',async()=>{await signOut(auth);toast('Signed out');},{confirmText:'Sign out',variant:'confirm'}));
  $('menuToggle').addEventListener('click',()=>{sidebar.classList.add('open');sidebarBackdrop.classList.add('open');});
  $('closeSidebarBtn').addEventListener('click',()=>{sidebar.classList.remove('open');sidebarBackdrop.classList.remove('open');});
  sidebarBackdrop.addEventListener('click',closeSidebarOnMobile);
  function closeSidebarOnMobile(){if(window.innerWidth<=768){sidebar.classList.remove('open');sidebarBackdrop.classList.remove('open');}}
</script>
</body>
</html>

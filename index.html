<script type="module">
  // ⚠️ FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyAVDfZjSFVah2L5QmlTThhG5pQzCrRjl7M",
    authDomain: "venixdynamics.firebaseapp.com",
    projectId: "venixdynamics",
    storageBucket: "venixdynamics.firebasestorage.app",
    messagingSenderId: "772891926339",
    appId: "1:772891926339:web:9c25a9f1fbf0af047999f6",
    measurementId: "G-9PQ14ND007"
  };

  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js';
  import { getFirestore, collection, doc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, limit, where, getDocs, writeBatch, serverTimestamp, enableIndexedDbPersistence } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js';

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  enableIndexedDbPersistence(db).catch(()=>{});

  // ============================================================
  // STATE
  // ============================================================
  const state = {
    user: null,
    pages: [], blocks: [], tasks: [], activities: [], savedViews: [],
    currentPageId: null,
    currentView: 'tasks',  // 'tasks' | 'page' | 'recent' | 'archive' | 'activity'
    archiveTab: 'pages',   // 'pages' | 'tasks'
    taskView: 'list',
    sort: null, groupBy: 'status',
    activeFilters: { status:[], priority:[], dueDate:null, owner:'', tag:'' },
    boardLocked: false,
    openTaskId: null,
    sidebarCollapsed: false,
    density: 'comfortable',
    focusTaskId: null,
    focusTaskMode: null,
    activeViewId: null,    // null = "All" default; otherwise a saved view id
    calendarMonth: null,   // {year, month} — null means current month
    unsubPages:null, unsubBlocks:null, unsubTasks:null, unsubConfig:null, unsubActivities:null, unsubSavedViews:null,
  };
  const expandedPages = new Set();

  // ============================================================
  // HELPERS
  // ============================================================
  const $ = id => document.getElementById(id);
  const authScreen=$('authScreen'), appEl=$('app'), contentBody=$('contentBody'),
        breadcrumb=$('breadcrumb'), pagesList=$('pagesList'), pinnedList=$('pinnedList'),
        userEmail=$('userEmail'), userAvatar=$('userAvatar'), statusDot=$('statusDot'),
        statusText=$('statusText'), sidebar=$('sidebar'), sidebarBackdrop=$('sidebarBackdrop'),
        searchOverlay=$('searchOverlay');

  function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
  function escapeAttr(s){return escapeHtml(s)}
  function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2400)}
  function autoResize(ta){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px'}
  function isTextInputFocused(){
    const a=document.activeElement;
    if(!a)return false;
    if(a.tagName==='INPUT'||a.tagName==='TEXTAREA'||a.tagName==='SELECT')return true;
    if(a.isContentEditable)return true;
    return false;
  }

  // ============================================================
  // PERSIST VIEW PREFS + RECENT + SIDEBAR STATE
  // ============================================================
  function loadViewPrefs(){
    try{
      const p=JSON.parse(localStorage.getItem('ws_vp')||'{}');
      state.taskView=p.taskView||'kanban';
      state.sort=p.sort||null;
      state.groupBy=p.groupBy||'status';
      state.activeFilters=p.af||{status:[],priority:[],dueDate:null,owner:'',tag:''};
      state.sidebarCollapsed=!!p.sidebarCollapsed;
      state.density=p.density||'comfortable';
      state.activeViewId=p.activeViewId||null;
    }catch{}
  }
  function saveViewPrefs(){
    localStorage.setItem('ws_vp',JSON.stringify({
      taskView:state.taskView,sort:state.sort,groupBy:state.groupBy,af:state.activeFilters,
      sidebarCollapsed:state.sidebarCollapsed,density:state.density,
      activeViewId:state.activeViewId,
    }));
  }
  loadViewPrefs();
  function applyDensity(){ document.body.dataset.density = state.density || 'comfortable'; }
  applyDensity();

  const RECENT_LIMIT = 12;
  function recentKey(){return state.user?`ws_recent_${state.user.uid}`:null;}
  function loadRecent(){
    try{const k=recentKey();if(!k)return[];return JSON.parse(localStorage.getItem(k)||'[]');}catch{return[];}
  }
  function pushRecent(pageId){
    const k=recentKey();if(!k||!pageId)return;
    let arr=loadRecent().filter(id=>id!==pageId);
    arr.unshift(pageId);
    if(arr.length>RECENT_LIMIT)arr=arr.slice(0,RECENT_LIMIT);
    localStorage.setItem(k,JSON.stringify(arr));
  }
  function removeRecent(pageId){
    const k=recentKey();if(!k)return;
    const arr=loadRecent().filter(id=>id!==pageId);
    localStorage.setItem(k,JSON.stringify(arr));
  }

  // ============================================================
  // DATE HELPERS
  // ============================================================
  function todayStr(){return new Date().toISOString().slice(0,10)}
  function formatDate(iso){
    if(!iso)return'';
    const d=new Date(iso+'T00:00:00');
    const now=new Date();now.setHours(0,0,0,0);
    const diff=Math.round((d-now)/86400000);
    if(diff===0)return'Today';
    if(diff===1)return'Tomorrow';
    if(diff===-1)return'Yesterday';
    return d.toLocaleDateString('en',{month:'short',day:'numeric'});
  }
  function dueBadgeClass(iso){
    if(!iso)return'';
    const d=new Date(iso+'T00:00:00');
    const now=new Date();now.setHours(0,0,0,0);
    const diff=Math.round((d-now)/86400000);
    if(diff<0)return'overdue';
    if(diff<=3)return'due-soon';
    return'';
  }
  function relativeTime(date){
    if(!date)return'';
    const d=date.toDate?date.toDate():new Date(date);
    const diff=(Date.now()-d.getTime())/1000;
    if(diff<60)return'just now';
    if(diff<3600)return Math.floor(diff/60)+'m ago';
    if(diff<86400)return Math.floor(diff/3600)+'h ago';
    if(diff<86400*7)return Math.floor(diff/86400)+'d ago';
    return d.toLocaleDateString('en',{month:'short',day:'numeric'});
  }
  function dayLabel(date){
    if(!date)return'—';
    const d=date.toDate?date.toDate():new Date(date);
    const today=new Date();today.setHours(0,0,0,0);
    const dd=new Date(d);dd.setHours(0,0,0,0);
    const diff=Math.round((today-dd)/86400000);
    if(diff===0)return'Today';
    if(diff===1)return'Yesterday';
    if(diff<7)return d.toLocaleDateString('en',{weekday:'long'});
    return d.toLocaleDateString('en',{month:'short',day:'numeric',year:diff>365?'numeric':undefined});
  }
  function getOwnerSuggestions(){
    const set=new Set();
    if(state.user?.email)set.add(state.user.email);
    state.tasks.forEach(t=>{if(t.owner)set.add(t.owner); if(t.createdBy)set.add(t.createdBy); if(t.updatedBy)set.add(t.updatedBy);});
    state.pages.forEach(p=>{if(p.createdBy)set.add(p.createdBy); if(p.updatedBy)set.add(p.updatedBy);});
    return [...set].filter(Boolean).sort((a,b)=>a.localeCompare(b)).slice(0,8);
  }
  function scheduleTaskFocus(taskId, mode='list'){
    state.focusTaskId = taskId;
    state.focusTaskMode = mode;
  }
  function consumeTaskFocus(mode){
    if(state.focusTaskId && state.focusTaskMode===mode){
      const id = state.focusTaskId;
      state.focusTaskId = null;
      state.focusTaskMode = null;
      return id;
    }
    return null;
  }

  // ============================================================
  // AUTH
  // ============================================================
  let authMode='signin';
  document.querySelectorAll('.auth-tab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.auth-tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active'); authMode=t.dataset.tab;
    $('authSubmit').textContent=authMode==='signin'?'Sign in':'Create account';
    $('passwordInput').autocomplete=authMode==='signin'?'current-password':'new-password';
    $('authError').hidden=true;
  }));
  $('authForm').addEventListener('submit',async e=>{
    e.preventDefault();
    const email=$('emailInput').value.trim(), password=$('passwordInput').value;
    const btn=$('authSubmit'); btn.disabled=true; $('authError').hidden=true;
    try{
      if(authMode==='signin')await signInWithEmailAndPassword(auth,email,password);
      else await createUserWithEmailAndPassword(auth,email,password);
    }catch(err){
      console.error('Firebase auth error:', err?.code, err?.message, err);
      const map={'auth/invalid-email':"Email looks wrong.",'auth/user-not-found':'No account found.','auth/wrong-password':'Wrong password.','auth/invalid-credential':'Email or password incorrect.','auth/email-already-in-use':'Email already in use.','auth/weak-password':'Password must be 6+ chars.','auth/too-many-requests':'Too many attempts.','auth/network-request-failed':'Network error.','auth/operation-not-allowed':'Email/password sign-in is not enabled in Firebase.','auth/app-not-authorized':'This deployed site is not authorized for Firebase Auth.','auth/unauthorized-domain':'This domain is not authorized in Firebase Authentication settings.'};
      const e=$('authError'); e.textContent=map[err.code]||`${err.code||'Unknown error'}: ${err.message||'Please try again.'}`; e.hidden=false;
    }finally{btn.disabled=false}
  });
  onAuthStateChanged(auth,user=>{
    if(user){
      state.user=user; authScreen.hidden=true; appEl.hidden=false;
      userEmail.textContent=user.email;
      userAvatar.textContent=(user.email[0]||'U').toUpperCase();
      applyDensity();
      applySidebarCollapsed();
      attachListeners(); render();
    }else{
      state.user=null; detachListeners();
      authScreen.hidden=false; appEl.hidden=true;
    }
  });
  window.addEventListener('online',()=>{statusText.textContent='Synced';statusDot.classList.remove('offline')});
  window.addEventListener('offline',()=>{statusText.textContent='Offline';statusDot.classList.add('offline')});

  // ============================================================
  // FIRESTORE LISTENERS
  // ============================================================
  function attachListeners(){
    state.unsubPages=onSnapshot(query(collection(db,'workspace','main','pages'),orderBy('order')),snap=>{
      state.pages=snap.docs.map(d=>({id:d.id,...d.data()}));
      renderPagesList();
      if(state.currentView==='page'){
        const cur=state.pages.find(p=>p.id===state.currentPageId);
        if(!cur||cur.isArchived){
          state.currentPageId=null;state.currentView='tasks';render();
        }
      }
      if(state.currentView==='recent'||state.currentView==='archive')renderCurrent();
    });
    state.unsubTasks=onSnapshot(query(collection(db,'workspace','main','tasks'),orderBy('createdAt','desc')),snap=>{
      state.tasks=snap.docs.map(d=>({id:d.id,...d.data()}));
      if(state.currentView==='tasks'||state.currentView==='archive')renderCurrent();
      if(state.openTaskId){
        const t=state.tasks.find(x=>x.id===state.openTaskId);
        if(t)refreshDetailPanel(t);
        else closeTaskDetail();
      }
    });
    state.unsubConfig=onSnapshot(doc(db,'workspace','main','config','board'),snap=>{
      if(snap.exists()){state.boardLocked=snap.data().locked||false;}
      else state.boardLocked=false;
      if(state.currentView==='tasks')renderCurrent();
    });
    state.unsubActivities=onSnapshot(query(collection(db,'workspace','main','activity'),orderBy('at','desc'),limit(80)),snap=>{
      state.activities=snap.docs.map(d=>({id:d.id,...d.data()}));
      if(state.currentView==='activity')renderCurrent();
    });
    state.unsubSavedViews=onSnapshot(query(collection(db,'workspace','main','savedViews'),orderBy('order')),snap=>{
      state.savedViews=snap.docs.map(d=>({id:d.id,...d.data()}));
      // If active view was deleted, fall back to "All"
      if(state.activeViewId&&!state.savedViews.find(v=>v.id===state.activeViewId)){
        state.activeViewId=null;
      }
      if(state.currentView==='tasks')renderCurrent();
    });
  }
  function detachListeners(){
    state.unsubPages?.();state.unsubBlocks?.();state.unsubTasks?.();state.unsubConfig?.();state.unsubActivities?.();state.unsubSavedViews?.();
    state.unsubPages=state.unsubBlocks=state.unsubTasks=state.unsubConfig=state.unsubActivities=state.unsubSavedViews=null;
  }
  function listenToBlocks(pageId){
    state.unsubBlocks?.();
    state.unsubBlocks=onSnapshot(query(collection(db,'workspace','main','pages',pageId,'blocks'),orderBy('order')),snap=>{
      const wasEmpty = state.blocks.length === 0;
      state.blocks=snap.docs.map(d=>({id:d.id,...d.data()}));
      if(state.currentView==='page'&&state.currentPageId===pageId){
        renderBlocks();
        // After auto-create lands, focus the new block so the user can start typing immediately
        if(wasEmpty && state.blocks.length === 1){
          setTimeout(()=>{
            $('blocksContainer')?.querySelector('.block-content')?.focus();
          }, 50);
        }
      }
      // If the page has zero blocks, create a starter text block.
      // This ensures every page always has at least one editable surface
      // — needed for typing and for the slash menu to work.
      if(state.blocks.length === 0 && state.currentPageId === pageId){
        addBlock('text', '');
      }
    });
  }

  // ============================================================
  // ACTIVITY LOG
  // ============================================================
  async function logActivity(type,target,targetId,targetTitle,meta={}){
    try{
      await addDoc(collection(db,'workspace','main','activity'),{
        type,target,targetId:targetId||null,targetTitle:targetTitle||'',
        user:state.user?.email||'unknown',at:serverTimestamp(),meta,
      });
    }catch{}
  }

  // ============================================================
  // SAVED VIEWS (CRUD + apply)
  // ============================================================
  async function createSavedView(name,icon,settings){
    const ref=await addDoc(collection(db,'workspace','main','savedViews'),{
      name,icon:icon||'📋',
      taskView:settings.taskView||'kanban',
      sort:settings.sort||null,
      groupBy:settings.groupBy||'status',
      activeFilters:settings.activeFilters||{status:[],priority:[],dueDate:null,owner:'',tag:''},
      order:Date.now(),
      createdAt:serverTimestamp(),
      createdBy:state.user.email,
    });
    state.activeViewId=ref.id;
    return ref;
  }
  async function updateSavedView(id,data){
    await updateDoc(doc(db,'workspace','main','savedViews',id),{...data,updatedAt:serverTimestamp()});
  }
  async function deleteSavedView(id){
    await deleteDoc(doc(db,'workspace','main','savedViews',id));
    if(state.activeViewId===id)state.activeViewId=null;
  }
  function applyView(viewId){
    state.activeViewId=viewId;
    if(viewId){
      const v=state.savedViews.find(x=>x.id===viewId);
      if(v){
        state.taskView=v.taskView||'kanban';
        state.sort=v.sort||null;
        state.groupBy=v.groupBy||'status';
        state.activeFilters=v.activeFilters?{...v.activeFilters}:{status:[],priority:[],dueDate:null,owner:'',tag:''};
      }
    }
    saveViewPrefs();
    renderTasksView();
  }

  // ============================================================
  // PAGE FULL-WIDTH TOGGLE
  // ============================================================
  async function setPageFullWidth(pageId,isFullWidth){
    await updateDoc(doc(db,'workspace','main','pages',pageId),{isFullWidth,updatedAt:serverTimestamp()});
  }

  // ============================================================
  // CRUD: PAGES (with archive)
  // ============================================================
  async function createPage(parentId=null){
    const ref=await addDoc(collection(db,'workspace','main','pages'),{
      title:'Untitled',order:Date.now(),parentId:parentId||null,
      isPinned:false,isArchived:false,
      createdAt:serverTimestamp(),updatedAt:serverTimestamp(),createdBy:state.user.email,updatedBy:state.user.email,
    });
    if(parentId)expandedPages.add(parentId);
    logActivity('page_created','page',ref.id,'Untitled');
    selectPage(ref.id);
  }
  async function createPageFromTemplate(template,parentId=null){
    const ref=await addDoc(collection(db,'workspace','main','pages'),{
      title:template.title,order:Date.now(),parentId:parentId||null,
      isPinned:false,isArchived:false,
      createdAt:serverTimestamp(),updatedAt:serverTimestamp(),createdBy:state.user.email,updatedBy:state.user.email,
    });
    if(template.blocks?.length){
      const batch=writeBatch(db);
      template.blocks.forEach((b,i)=>{
        const r=doc(collection(db,'workspace','main','pages',ref.id,'blocks'));
        batch.set(r,{type:b.type,content:b.content||'',checked:false,order:(i+1)*1000,createdAt:serverTimestamp()});
      });
      await batch.commit();
    }
    logActivity('page_created','page',ref.id,template.title,{template:template.id});
    selectPage(ref.id);
  }
  async function renamePage(pageId,title){
    await updateDoc(doc(db,'workspace','main','pages',pageId),{title,updatedAt:serverTimestamp(),updatedBy:state.user?.email||''});
  }
  async function setPagePinned(pageId,pinned){
    const p=state.pages.find(x=>x.id===pageId);
    await updateDoc(doc(db,'workspace','main','pages',pageId),{isPinned:pinned,updatedAt:serverTimestamp()});
    logActivity(pinned?'page_pinned':'page_unpinned','page',pageId,p?.title||'Untitled');
  }
  async function archivePage(pageId){
    const p=state.pages.find(x=>x.id===pageId);
    await updateDoc(doc(db,'workspace','main','pages',pageId),{isArchived:true,isPinned:false,archivedAt:serverTimestamp(),updatedAt:serverTimestamp()});
    removeRecent(pageId);
    logActivity('page_archived','page',pageId,p?.title||'Untitled');
    if(state.currentPageId===pageId){state.currentPageId=null;state.currentView='tasks';render();}
  }
  async function restorePage(pageId){
    const p=state.pages.find(x=>x.id===pageId);
    await updateDoc(doc(db,'workspace','main','pages',pageId),{isArchived:false,updatedAt:serverTimestamp()});
    logActivity('page_restored','page',pageId,p?.title||'Untitled');
  }
  async function permanentDeletePage(pageId){
    const p=state.pages.find(x=>x.id===pageId);
    const bs=await getDocs(collection(db,'workspace','main','pages',pageId,'blocks'));
    const batch=writeBatch(db);
    bs.docs.forEach(d=>batch.delete(d.ref));
    batch.delete(doc(db,'workspace','main','pages',pageId));
    await batch.commit();
    removeRecent(pageId);
    logActivity('page_deleted','page',pageId,p?.title||'Untitled');
    if(state.currentPageId===pageId){state.currentPageId=null;state.currentView='tasks';render();}

  async function reorderPage(draggedId,targetId,dropPosition){
    // Reorder dragged within its sibling list. Both must share the same parentId.
    const dragged=state.pages.find(p=>p.id===draggedId);
    const target=state.pages.find(p=>p.id===targetId);
    if(!dragged||!target||dragged.parentId!==target.parentId)return;
    const siblings=state.pages.filter(p=>p.parentId===dragged.parentId&&!p.isArchived).sort((a,b)=>a.order-b.order);
    const otherIds=siblings.map(p=>p.id).filter(id=>id!==draggedId);
    const targetIdx=otherIds.indexOf(targetId);
    if(targetIdx<0)return;
    const insertAt=dropPosition==='before'?targetIdx:targetIdx+1;
    let newOrder;
    if(insertAt===0){
      newOrder=(siblings.find(p=>p.id===otherIds[0])?.order||1000)-1000;
    }else if(insertAt>=otherIds.length){
      const lastId=otherIds[otherIds.length-1];
      newOrder=(siblings.find(p=>p.id===lastId)?.order||0)+1000;
    }else{
      const beforeId=otherIds[insertAt-1],afterId=otherIds[insertAt];
      const a=siblings.find(p=>p.id===beforeId)?.order||0;
      const b=siblings.find(p=>p.id===afterId)?.order||a+2000;
      newOrder=(a+b)/2;
    }
    await updateDoc(doc(db,'workspace','main','pages',draggedId),{order:newOrder});
  }

  async function addBlock(type='text',content='',afterBlockId=null){
    if(!state.currentPageId)return;
    let order;
    if(afterBlockId){
      const idx=state.blocks.findIndex(b=>b.id===afterBlockId);
      if(idx>=0&&idx<state.blocks.length-1)order=(state.blocks[idx].order+state.blocks[idx+1].order)/2;
      else if(idx>=0)order=state.blocks[idx].order+1000;
      else order=state.blocks.length>0?state.blocks[state.blocks.length-1].order+1000:1000;
    }else{
      order=state.blocks.length>0?state.blocks[state.blocks.length-1].order+1000:1000;
    }
    return await addDoc(collection(db,'workspace','main','pages',state.currentPageId,'blocks'),
      {type,content,checked:false,order,createdAt:serverTimestamp()});
  }

  async function reorderBlock(draggedId,targetId,dropPosition){
    if(draggedId===targetId)return;
    const blocks=[...state.blocks].sort((a,b)=>a.order-b.order);
    const otherIds=blocks.map(b=>b.id).filter(id=>id!==draggedId);
    const targetIdx=otherIds.indexOf(targetId);
    if(targetIdx<0)return;
    const insertAt=dropPosition==='before'?targetIdx:targetIdx+1;
    let newOrder;
    if(insertAt===0){
      newOrder=(blocks.find(b=>b.id===otherIds[0])?.order||1000)-1000;
    }else if(insertAt>=otherIds.length){
      const lastId=otherIds[otherIds.length-1];
      newOrder=(blocks.find(b=>b.id===lastId)?.order||0)+1000;
    }else{
      const beforeId=otherIds[insertAt-1],afterId=otherIds[insertAt];
      const a=blocks.find(b=>b.id===beforeId)?.order||0;
      const b=blocks.find(x=>x.id===afterId)?.order||a+2000;
      newOrder=(a+b)/2;
    }
    await updateBlock(draggedId,{order:newOrder});
  }
  async function moveBlockBy(blockId,delta){
    // Move block up/down by 1 position
    const blocks=[...state.blocks].sort((a,b)=>a.order-b.order);
    const idx=blocks.findIndex(b=>b.id===blockId);
    if(idx<0)return;
    const newIdx=idx+delta;
    if(newIdx<0||newIdx>=blocks.length)return;
    const target=blocks[newIdx];
    const dropPosition=delta<0?'before':'after';
    await reorderBlock(blockId,target.id,dropPosition);
  }

  async function createTask(overrides={}){
    if(state.boardLocked)return null;
    const defaultStatus = overrides.status || (state.activeFilters.status.length===1 ? state.activeFilters.status[0] : 'todo');
    const defaultPriority = overrides.priority || (state.activeFilters.priority.length===1 ? state.activeFilters.priority[0] : 'medium');
    const ownerHint = overrides.owner ?? (state.activeFilters.owner && getOwnerSuggestions().includes(state.activeFilters.owner) ? state.activeFilters.owner : '');
    const ref=await addDoc(collection(db,'workspace','main','tasks'),{
      title: overrides.title || 'New task',status:defaultStatus,priority:defaultPriority,
      owner:ownerHint,tags:overrides.tags||[],dueDate:overrides.dueDate||null,isArchived:false,
      createdAt:serverTimestamp(),updatedAt:serverTimestamp(),createdBy:state.user.email,updatedBy:state.user.email,
      completedAt: defaultStatus==='done' ? serverTimestamp() : null,
      completedBy: defaultStatus==='done' ? state.user.email : null,
    });
    scheduleTaskFocus(ref.id, state.taskView==='kanban' ? 'detail' : 'list');
    logActivity('task_created','task',ref.id,overrides.title||'New task');
    return ref.id;
  }
  async function updateTask(taskId,data){
    const prev=state.tasks.find(t=>t.id===taskId);
    const payload={...data,updatedAt:serverTimestamp(),updatedBy:state.user?.email||''};
    if(Object.prototype.hasOwnProperty.call(data,'status') && prev && prev.status!==data.status){
      if(data.status==='done'){
        payload.completedAt=serverTimestamp();
        payload.completedBy=state.user?.email||'';
      }else if(prev.status==='done' && data.status!=='done'){
        payload.completedAt=null;
        payload.completedBy=null;
      }
    }
    await updateDoc(doc(db,'workspace','main','tasks',taskId),payload);
    if(data.status&&prev&&prev.status!==data.status){
      logActivity('task_status','task',taskId,prev.title||'Untitled',{from:prev.status,to:data.status});
    }
  }

  // ============================================================
  // EFFECTIVE-ARCHIVED: a page is hidden if itself or any ancestor is archived
  // ============================================================
  function isAncestorArchived(page){
    let cur=page;
    const seen=new Set();
    while(cur&&cur.parentId&&!seen.has(cur.id)){
      seen.add(cur.id);
      const parent=state.pages.find(p=>p.id===cur.parentId);
      if(!parent)return false;
      if(parent.isArchived)return true;
      cur=parent;
    }
    return false;
  }
  function isPageVisible(page){
    if(page.isArchived)return false;
    return !isAncestorArchived(page);
  }
  function visiblePages(){return state.pages.filter(isPageVisible);}
  function visibleTasks(){return state.tasks.filter(t=>!t.isArchived);}

  // ============================================================
  // COMPUTED TASKS (filter + sort) — operates on visibleTasks
  // ============================================================
  function passesFilters(t){
    const f=state.activeFilters;
    if(f.status.length&&!f.status.includes(t.status))return false;
    if(f.priority.length&&!f.priority.includes(t.priority||'medium'))return false;
    if(f.owner&&!(t.owner||'').toLowerCase().includes(f.owner.toLowerCase()))return false;
    if(f.tag&&!(t.tags||[]).some(tg=>tg.toLowerCase().includes(f.tag.toLowerCase())))return false;
    if(f.dueDate){
      const now=new Date();now.setHours(0,0,0,0);
      const td=t.dueDate?new Date(t.dueDate+'T00:00:00'):null;
      if(f.dueDate==='overdue'&&(!td||td>=now))return false;
      if(f.dueDate==='today'&&(!td||td.toISOString().slice(0,10)!==now.toISOString().slice(0,10)))return false;
      if(f.dueDate==='week'){const e=new Date(now);e.setDate(e.getDate()+7);if(!td||td<now||td>e)return false}
      if(f.dueDate==='none'&&td)return false;
    }
    return true;
  }
  const PRIORITY_ORDER={urgent:0,high:1,medium:2,low:3};
  const STATUS_ORDER={todo:0,doing:1,done:2,blocked:3};
  function computedTasks(){
    let tasks=visibleTasks().filter(passesFilters);
    if(state.sort){
      const {field,dir}=state.sort;
      tasks.sort((a,b)=>{
        let va=a[field]??'',vb=b[field]??'';
        if(field==='priority'){va=PRIORITY_ORDER[va]??2;vb=PRIORITY_ORDER[vb]??2;}
        else if(field==='status'){va=STATUS_ORDER[va]??0;vb=STATUS_ORDER[vb]??0;}
        else if(field==='dueDate'){va=va?new Date(va+'T00:00:00').getTime():Infinity;vb=vb?new Date(vb+'T00:00:00').getTime():Infinity;}
        else if(field==='createdAt'){va=a.createdAt?.seconds??0;vb=b.createdAt?.seconds??0;}
        const cmp=va<vb?-1:va>vb?1:0;
        return dir==='asc'?cmp:-cmp;
      });
    }
    return tasks;
  }
  function groupedTasks(tasks){
    const gb=state.groupBy;
    if(gb==='none')return[{key:'all',label:'All tasks',tasks}];
    const map={};
    tasks.forEach(t=>{
      const key=gb==='owner'?(t.owner||'Unassigned'):gb==='status'?(t.status||'todo'):gb==='priority'?(t.priority||'medium'):'other';
      if(!map[key])map[key]=[];
      map[key].push(t);
    });
    const orders={status:['todo','doing','done','blocked'],priority:['urgent','high','medium','low']};
    const ord=orders[gb];
    let keys=ord?[...ord.filter(k=>map[k]),...Object.keys(map).filter(k=>!ord.includes(k)&&map[k])]:Object.keys(map).sort();
    return keys.map(k=>({key:k,label:groupLabel(k,gb),tasks:map[k]||[]}));
  }
  function groupLabel(key,gb){
    if(gb==='status')return{todo:'To do',doing:'In progress',done:'Done',blocked:'Blocked'}[key]||key;
    if(gb==='priority')return{urgent:'Urgent',high:'High',medium:'Medium',low:'Low'}[key]||key;
    return key||'—';
  }
  function hasActiveFilters(){
    const f=state.activeFilters;
    return f.status.length>0||f.priority.length>0||f.dueDate||f.owner||f.tag;
  }
  function countActiveFilters(){
    const f=state.activeFilters;
    return f.status.length+(f.priority.length?1:0)+(f.dueDate?1:0)+(f.owner?1:0)+(f.tag?1:0);
  }

        <button class="page-add-child-btn" data-id="${page.id}" title="Add sub-page"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button>

    item.querySelector('.page-pin-btn')?.addEventListener('click',e=>{e.stopPropagation();setPagePinned(page.id,!page.isPinned);});
    item.querySelector('.page-add-child-btn')?.addEventListener('click',e=>{e.stopPropagation();createPage(page.id);});
    item.querySelector('.page-archive-btn')?.addEventListener('click',e=>{e.stopPropagation();archivePage(page.id);toast('Archived "'+(page.title||'Untitled')+'"');});
    setupPageDrag(item,page);

    if(hasC&&isExp)children.forEach(c=>renderPageItem(c,depth+1,childMap));

  function setupPageDrag(item,page){
    item.addEventListener('dragstart',e=>{
      e.stopPropagation();
      e.dataTransfer.setData('text/plain','page:'+page.id);
      e.dataTransfer.effectAllowed='move';
      item.classList.add('dragging');
    });
    item.addEventListener('dragend',()=>{
      item.classList.remove('dragging');
      pagesList.querySelectorAll('.drop-before,.drop-after').forEach(el=>el.classList.remove('drop-before','drop-after'));
    });
    item.addEventListener('dragover',e=>{
      const data=e.dataTransfer.types.includes('text/plain')?'page':null;
      if(data!=='page')return;
      e.preventDefault();e.dataTransfer.dropEffect='move';
      const rect=item.getBoundingClientRect();
      const before=e.clientY<rect.top+rect.height/2;
      pagesList.querySelectorAll('.drop-before,.drop-after').forEach(el=>el.classList.remove('drop-before','drop-after'));
      item.classList.add(before?'drop-before':'drop-after');
    });
    item.addEventListener('dragleave',e=>{
      if(!item.contains(e.relatedTarget))item.classList.remove('drop-before','drop-after');
    });
    item.addEventListener('drop',async e=>{
      e.preventDefault();e.stopPropagation();
      const raw=e.dataTransfer.getData('text/plain');
      if(!raw||!raw.startsWith('page:'))return;
      const draggedId=raw.slice(5);
      const before=item.classList.contains('drop-before');
      item.classList.remove('drop-before','drop-after');
      if(draggedId===page.id)return;
      await reorderPage(draggedId,page.id,before?'before':'after');
    });
  }

  // ============================================================
  // SLASH MENU
  // ============================================================
  let slashMenuState=null;
  const SLASH_TYPES=[
    {type:'text',icon:'¶',name:'Text',desc:'Plain paragraph'},
    {type:'h1',icon:'H1',name:'Heading 1',desc:'Large section heading'},
    {type:'h2',icon:'H2',name:'Heading 2',desc:'Medium heading'},
    {type:'h3',icon:'H3',name:'Heading 3',desc:'Small heading'},
    {type:'bullet',icon:'•',name:'Bullet',desc:'Bulleted list item'},
    {type:'todo',icon:'☐',name:'To-do',desc:'Trackable checklist'},
    {type:'toggle',icon:'▶',name:'Toggle',desc:'Collapsible block'},
    {type:'quote',icon:'"',name:'Quote',desc:'Highlighted quote'},
    {type:'divider',icon:'—',name:'Divider',desc:'Horizontal separator'},
  ];
  function openSlashMenu(textarea,blockEl,slashPos){
    closeSlashMenu();
    const rect=textarea.getBoundingClientRect();
    const el=document.createElement('div');el.className='slash-menu';
    el.style.left=rect.left+'px';
    el.style.top=Math.min(rect.bottom+4,window.innerHeight-340)+'px';
    document.body.appendChild(el);
    slashMenuState={el,blockId:blockEl.dataset.id,blockEl,textarea,slashPos,items:[],focusIdx:0};
    updateSlashMenu('');
  }
  function updateSlashMenu(q){
    if(!slashMenuState)return;
    const ql=q.toLowerCase();
    const filtered=ql?SLASH_TYPES.filter(t=>t.name.toLowerCase().includes(ql)||t.type.includes(ql)):SLASH_TYPES;
    slashMenuState.items=filtered;slashMenuState.focusIdx=0;
    const el=slashMenuState.el;el.innerHTML='';
    if(!filtered.length){el.innerHTML='<div class="slash-no-results">No matching blocks</div>';return;}
    filtered.forEach((bt,i)=>{
      const item=document.createElement('button');
      item.className='slash-item'+(i===0?' focused':'');
      item.innerHTML=`<span class="slash-item-icon">${bt.icon}</span><span><div class="slash-item-name">${bt.name}</div><div class="slash-item-desc">${bt.desc}</div></span>`;
      item.addEventListener('mousedown',e=>{e.preventDefault();applySlashItem(bt.type);});
      el.appendChild(item);
    });
  }
  function setSlashFocus(d){
    if(!slashMenuState)return;
    const len=slashMenuState.items.length;if(!len)return;
    slashMenuState.focusIdx=((slashMenuState.focusIdx+d)+len)%len;
    slashMenuState.el.querySelectorAll('.slash-item').forEach((el,i)=>el.classList.toggle('focused',i===slashMenuState.focusIdx));
    slashMenuState.el.querySelectorAll('.slash-item')[slashMenuState.focusIdx]?.scrollIntoView({block:'nearest'});
  }
  async function applySlashItem(type){
    if(!slashMenuState)return;
    const{textarea,slashPos,blockId}=slashMenuState;
    const newContent=textarea.value.slice(0,slashPos);
    closeSlashMenu();
    if(type==='divider'){
      if(newContent.trim()){
        // Keep typed content as a text block, insert divider after, then new text block to continue typing
        await updateBlock(blockId,{content:newContent});
        const dRef=await addBlock('divider','',blockId);
        if(dRef)await addBlock('text','',dRef.id);
      }else{
        await updateBlock(blockId,{type,content:''});
        addBlock('text','',blockId);
      }
    }else{await updateBlock(blockId,{type,content:newContent,checked:false});textarea.value=newContent;autoResize(textarea);textarea.focus();}
  }
  function closeSlashMenu(){if(slashMenuState){slashMenuState.el.remove();slashMenuState=null;}}
  document.addEventListener('click',e=>{if(slashMenuState&&!slashMenuState.el.contains(e.target))closeSlashMenu();});

  // ============================================================
  // RENDER BLOCKS (with drag-to-reorder)
  // ============================================================
  function renderBlocks(){
    const container=$('blocksContainer');if(!container)return;
    container.innerHTML='';
    if(!state.blocks.length){
      const h=document.createElement('div');
      h.className='page-empty-prompt';
      h.innerHTML='Start writing or type <strong>/</strong> for blocks…';
      container.appendChild(h);return;
    }
    state.blocks.forEach(block=>{
      const el=document.createElement('div');
      el.className='block'+(block.checked&&block.type==='toggle'?' collapsed':'')+(block.checked&&block.type==='todo'?' checked':'');
      el.dataset.type=block.type;el.dataset.id=block.id;
      const controls=`<div class="block-controls"><button class="block-drag-handle" title="Drag to reorder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="18" r="1"/></svg></button><button class="block-delete-btn" title="Delete block"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button></div>`;
      if(block.type==='divider'){el.innerHTML=controls+'<div class="block-divider"></div>';el.querySelector('.block-delete-btn').addEventListener('click',()=>deleteBlock(block.id));setupBlockDrag(el,block);container.appendChild(el);return;}
      const placeholder={text:'Type something… or / for commands',h1:'Heading 1',h2:'Heading 2',h3:'Heading 3',bullet:'List item',todo:'To-do item',toggle:'Toggle heading…',quote:'Quote…'}[block.type]||'Type…';
      let extra='';
      if(block.type==='todo')extra=`<input type="checkbox" class="todo-checkbox" ${block.checked?'checked':''}/>`;
      if(block.type==='toggle'){
        extra=`<button class="toggle-btn">${block.checked?'▶':'▾'}</button>`;
        if(block.checked){const pr=(block.content||'').split('\n')[0]||'Empty toggle';extra+=`<div class="toggle-preview">${escapeHtml(pr.slice(0,80))}${pr.length>80?'…':''}</div>`;}
      }
      el.innerHTML=`${controls}${extra}<textarea class="block-content" rows="1" placeholder="${placeholder}">${escapeHtml(block.content||'')}</textarea>`;
      const ta=el.querySelector('.block-content');autoResize(ta);
      let st;
      ta.addEventListener('input',()=>{
        autoResize(ta);clearTimeout(st);st=setTimeout(()=>updateBlock(block.id,{content:ta.value}),350);
        const cursor=ta.selectionStart,val=ta.value.slice(0,cursor),ls=val.lastIndexOf('/');
        if(ls!==-1&&(ls===0||/[\s\n]/.test(val[ls-1]))){
          const q=val.slice(ls+1);
          if(!q.includes(' ')&&!q.includes('\n')&&q.length<=20){
            if(!slashMenuState||slashMenuState.textarea!==ta)openSlashMenu(ta,el,ls);
            else updateSlashMenu(q);
          }else closeSlashMenu();
        }else closeSlashMenu();
      });
      ta.addEventListener('keydown',e=>{
        if(slashMenuState&&slashMenuState.textarea===ta){
          if(e.key==='ArrowDown'){e.preventDefault();setSlashFocus(1);return}
          if(e.key==='ArrowUp'){e.preventDefault();setSlashFocus(-1);return}
          if(e.key==='Enter'){e.preventDefault();applySlashItem(slashMenuState.items[slashMenuState.focusIdx]?.type);return}
          if(e.key==='Escape'){closeSlashMenu();return}
        }
        // Cmd/Ctrl + Enter on todo: toggle done
        if((e.metaKey||e.ctrlKey)&&e.key==='Enter'&&block.type==='todo'){
          e.preventDefault();updateBlock(block.id,{checked:!block.checked});return;
        }
        // Cmd/Ctrl + Shift + Up/Down: move block
        if((e.metaKey||e.ctrlKey)&&e.shiftKey&&(e.key==='ArrowUp'||e.key==='ArrowDown')){
          e.preventDefault();moveBlockBy(block.id,e.key==='ArrowUp'?-1:1);return;
        }
        if(e.key==='Enter'&&!e.shiftKey){
          e.preventDefault();
          updateBlock(block.id,{content:ta.value}).then(()=>{
            const nt=(block.type==='h1'||block.type==='h2'||block.type==='h3')?'text':block.type;
            addBlock(nt,'',block.id);
          });
        }else if(e.key==='Backspace'&&ta.value===''&&state.blocks.length>1){
          e.preventDefault();deleteBlock(block.id);
        }else if(e.key==='Tab'){
          e.preventDefault();const s=ta.selectionStart,en=ta.selectionEnd;
          ta.value=ta.value.slice(0,s)+'  '+ta.value.slice(en);ta.selectionStart=ta.selectionEnd=s+2;autoResize(ta);
        }
      });
      el.querySelector('.todo-checkbox')?.addEventListener('change',e=>updateBlock(block.id,{checked:e.target.checked}));
      el.querySelector('.toggle-btn')?.addEventListener('click',e=>{e.stopPropagation();updateBlock(block.id,{checked:!block.checked});});
      el.querySelector('.toggle-preview')?.addEventListener('click',()=>updateBlock(block.id,{checked:false}));
      el.querySelector('.block-delete-btn').addEventListener('click',()=>deleteBlock(block.id));
      setupBlockDrag(el,block);
      container.appendChild(el);
    });
  }
  function setupBlockDrag(el,block){
    const handle=el.querySelector('.block-drag-handle');
    if(!handle)return;
    handle.addEventListener('mousedown',()=>{el.draggable=true;});
    el.addEventListener('dragstart',e=>{
      if(!el.draggable){e.preventDefault();return;}
      e.dataTransfer.setData('text/plain','block:'+block.id);
      e.dataTransfer.effectAllowed='move';
      el.classList.add('dragging');
    });
    el.addEventListener('dragend',()=>{
      el.classList.remove('dragging');el.draggable=false;
      $('blocksContainer')?.querySelectorAll('.drop-before,.drop-after').forEach(b=>b.classList.remove('drop-before','drop-after'));
    });
    el.addEventListener('dragover',e=>{
      const types=Array.from(e.dataTransfer.types||[]);
      if(!types.includes('text/plain'))return;
      e.preventDefault();e.dataTransfer.dropEffect='move';
      const rect=el.getBoundingClientRect();
      const before=e.clientY<rect.top+rect.height/2;
      $('blocksContainer')?.querySelectorAll('.drop-before,.drop-after').forEach(b=>b.classList.remove('drop-before','drop-after'));
      el.classList.add(before?'drop-before':'drop-after');
    });
    el.addEventListener('dragleave',e=>{
      if(!el.contains(e.relatedTarget))el.classList.remove('drop-before','drop-after');
    });
    el.addEventListener('drop',async e=>{
      e.preventDefault();
      const raw=e.dataTransfer.getData('text/plain');
      if(!raw||!raw.startsWith('block:'))return;
      const draggedId=raw.slice(6);
      const before=el.classList.contains('drop-before');
      el.classList.remove('drop-before','drop-after');
      if(draggedId===block.id)return;
      await reorderBlock(draggedId,block.id,before?'before':'after');
    });
  }

    vt.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{state.taskView=b.dataset.view;saveViewPrefs();renderTasksView();}));
    bar.appendChild(vt);
    const sep=document.createElement('div');sep.className='fb-sep';bar.appendChild(sep);
    const filterActive=hasActiveFilters();
    const filterBtn=document.createElement('button');
    filterBtn.className='fb-btn'+(filterActive?' has-value':'');
    filterBtn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>Filter${filterActive?` (${countActiveFilters()})` :''}`;
    filterBtn.addEventListener('click',e=>{e.stopPropagation();if(activePopover){closePopover();return;}openFilterPopover(filterBtn);});
    bar.appendChild(filterBtn);
    const sortBtn=document.createElement('button');
    sortBtn.className='fb-btn'+(state.sort?' has-value':'');
    sortBtn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M7 12h10M11 18h2"/></svg>Sort${state.sort?': '+sortLabel(state.sort):''}`;
    sortBtn.addEventListener('click',e=>{e.stopPropagation();if(activePopover){closePopover();return;}openSortPopover(sortBtn);});
    bar.appendChild(sortBtn);
    const groupBtn=document.createElement('button');
    groupBtn.className='fb-btn'+(state.groupBy!=='none'?' has-value':'');
    groupBtn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Group: ${groupByLabel()}`;
    groupBtn.addEventListener('click',e=>{e.stopPropagation();if(activePopover){closePopover();return;}openGroupPopover(groupBtn);});
    bar.appendChild(groupBtn);
    const densityBtn=document.createElement('button');
    densityBtn.className='fb-btn'+(state.density==='compact'?' has-value':'');
    densityBtn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 12h16M4 17h10"/></svg>${state.density==='compact'?'Compact':'Comfortable'}`;
    densityBtn.title='Toggle density';
    densityBtn.addEventListener('click',()=>{state.density=state.density==='compact'?'comfortable':'compact';saveViewPrefs();applyDensity();renderTasksView();});
    bar.appendChild(densityBtn);
    const spacer=document.createElement('div');spacer.className='fb-spacer';bar.appendChild(spacer);
    const lockBtn=document.createElement('button');
    lockBtn.className='fb-btn'+(state.boardLocked?' has-value':'');
    lockBtn.title=state.boardLocked?'Unlock board':'Lock board';
    lockBtn.innerHTML=state.boardLocked
      ?`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Locked`
      :`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>Lock`;
    lockBtn.addEventListener('click',()=>setBoardLocked(!state.boardLocked));
    bar.appendChild(lockBtn);
    if(!state.boardLocked){
      const addBtn=document.createElement('button');addBtn.className='add-task-btn';addBtn.id='addTaskBtn';
      addBtn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>New task`;
      addBtn.addEventListener('click',()=>createTask());
      bar.appendChild(addBtn);
    }
    return bar;

  function buildFilterChips(){
    const wrap=document.createElement('div');wrap.className='filter-chips';
    const f=state.activeFilters;
    f.status.forEach(s=>{
      const c=document.createElement('div');c.className='filter-chip';
      c.innerHTML=`Status: ${escapeHtml(groupLabel(s,'status'))} <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>`;
      c.querySelector('button').addEventListener('click',()=>{f.status=f.status.filter(x=>x!==s);saveViewPrefs();renderTasksView();});
      wrap.appendChild(c);
    });
    if(f.priority.length){
      const c=document.createElement('div');c.className='filter-chip';
      c.innerHTML=`Priority: ${f.priority.map(p=>groupLabel(p,'priority')).join(', ')} <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>`;
      c.querySelector('button').addEventListener('click',()=>{f.priority=[];saveViewPrefs();renderTasksView();});
      wrap.appendChild(c);
    }
    if(f.dueDate){
      const labels={overdue:'Overdue',today:'Due today',week:'Due this week',none:'No due date'};
      const c=document.createElement('div');c.className='filter-chip';
      c.innerHTML=`Due: ${labels[f.dueDate]||f.dueDate} <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>`;
      c.querySelector('button').addEventListener('click',()=>{f.dueDate=null;saveViewPrefs();renderTasksView();});
      wrap.appendChild(c);
    }
    if(f.owner){
      const c=document.createElement('div');c.className='filter-chip';
      c.innerHTML=`Owner: ${escapeHtml(f.owner)} <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>`;
      c.querySelector('button').addEventListener('click',()=>{f.owner='';saveViewPrefs();renderTasksView();});
      wrap.appendChild(c);
    }
    if(f.tag){
      const c=document.createElement('div');c.className='filter-chip';
      c.innerHTML=`Tag: ${escapeHtml(f.tag)} <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>`;
      c.querySelector('button').addEventListener('click',()=>{f.tag='';saveViewPrefs();renderTasksView();});
      wrap.appendChild(c);
    }
    return wrap;
  }

  function openFilterPopover(anchor){
    const p=document.createElement('div');p.className='popover';
    const rect=anchor.getBoundingClientRect();
    const barRect=anchor.closest('.filter-bar').getBoundingClientRect();
    p.style.left=`${rect.left-barRect.left}px`;
    const f=state.activeFilters;
    p.innerHTML=`
      <div class="popover-row" style="margin-bottom:8px">
        <div class="popover-label" style="font-size:13px;font-weight:600;color:var(--text)">Filter</div>
        ${hasActiveFilters()?`<button class="popover-clear" id="clearAllFilters">Clear all</button>`:''}
      </div>
      <div class="popover-section">
        <div class="popover-label">Status</div>
        <div class="popover-chips" id="pf-status">
          ${['todo','doing','done','blocked'].map(s=>`<button class="pchip${f.status.includes(s)?' on':''}" data-s="${s}">${groupLabel(s,'status')}</button>`).join('')}
        </div>
      </div>
      <div class="popover-section">
        <div class="popover-label">Priority</div>
        <div class="popover-chips" id="pf-priority">
          ${['urgent','high','medium','low'].map(p=>`<button class="pchip${f.priority.includes(p)?' on':''}" data-p="${p}">${groupLabel(p,'priority')}</button>`).join('')}
        </div>
      </div>
      <div class="popover-section">
        <div class="popover-label">Due date</div>
        <div class="popover-chips" id="pf-due">
          ${[['overdue','Overdue'],['today','Today'],['week','This week'],['none','No date']].map(([v,l])=>`<button class="pchip${f.dueDate===v?' on':''}" data-d="${v}">${l}</button>`).join('')}
        </div>
      </div>
      <div class="popover-section">
        <div class="popover-label">Owner</div>
        <input class="popover-input" id="pf-owner" placeholder="Filter by owner…" value="${escapeAttr(f.owner)}"/>
      </div>
      <div class="popover-section" style="margin-bottom:0">
        <div class="popover-label">Tag</div>
        <input class="popover-input" id="pf-tag" placeholder="Filter by tag…" value="${escapeAttr(f.tag)}"/>
      </div>`;
    p.addEventListener('click',e=>e.stopPropagation());
    p.querySelector('#clearAllFilters')?.addEventListener('click',()=>{
      state.activeFilters={status:[],priority:[],dueDate:null,owner:'',tag:''};
      saveViewPrefs();closePopover();renderTasksView();
    });
    p.querySelectorAll('[data-s]').forEach(b=>b.addEventListener('click',()=>{
      const s=b.dataset.s;f.status=f.status.includes(s)?f.status.filter(x=>x!==s):[...f.status,s];
      b.classList.toggle('on',f.status.includes(s));saveViewPrefs();renderTasksView();
    }));
    p.querySelectorAll('[data-p]').forEach(b=>b.addEventListener('click',()=>{
      const pr=b.dataset.p;f.priority=f.priority.includes(pr)?f.priority.filter(x=>x!==pr):[...f.priority,pr];
      b.classList.toggle('on',f.priority.includes(pr));saveViewPrefs();renderTasksView();
    }));
    p.querySelectorAll('[data-d]').forEach(b=>b.addEventListener('click',()=>{
      f.dueDate=f.dueDate===b.dataset.d?null:b.dataset.d;
      p.querySelectorAll('[data-d]').forEach(x=>x.classList.toggle('on',x.dataset.d===f.dueDate));
      saveViewPrefs();renderTasksView();
    }));
    let ot,tg;
    p.querySelector('#pf-owner').addEventListener('input',e=>{clearTimeout(ot);ot=setTimeout(()=>{f.owner=e.target.value;saveViewPrefs();renderTasksView();},300);});
    p.querySelector('#pf-tag').addEventListener('input',e=>{clearTimeout(tg);tg=setTimeout(()=>{f.tag=e.target.value;saveViewPrefs();renderTasksView();},300);});
    anchor.closest('.filter-bar').style.position='relative';
    anchor.closest('.filter-bar').appendChild(p);
    activePopover=p;
  }

  const SORT_OPTIONS=[
    {field:'createdAt',dir:'desc',label:'Created (newest)'},
    {field:'createdAt',dir:'asc',label:'Created (oldest)'},
    {field:'dueDate',dir:'asc',label:'Due date (earliest)'},
    {field:'dueDate',dir:'desc',label:'Due date (latest)'},
    {field:'priority',dir:'asc',label:'Priority (highest)'},
    {field:'title',dir:'asc',label:'Title (A→Z)'},
    {field:'owner',dir:'asc',label:'Owner (A→Z)'},
  ];
  function sortLabel(s){return SORT_OPTIONS.find(o=>o.field===s.field&&o.dir===s.dir)?.label||'Custom';}
  function groupByLabel(){return{status:'Status',priority:'Priority',owner:'Owner',none:'None'}[state.groupBy]||state.groupBy;}

  function openSortPopover(anchor){
    const p=document.createElement('div');p.className='popover';
    const rect=anchor.getBoundingClientRect(),barRect=anchor.closest('.filter-bar').getBoundingClientRect();
    p.style.left=`${rect.left-barRect.left}px`;
    p.innerHTML=`<div class="popover-label" style="margin-bottom:6px;font-size:13px;font-weight:600;color:var(--text)">Sort by</div>`;
    SORT_OPTIONS.forEach(opt=>{
      const on=state.sort&&state.sort.field===opt.field&&state.sort.dir===opt.dir;
      const row=document.createElement('button');row.className='sort-option'+(on?' on':'');
      row.innerHTML=`<svg class="sort-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">${on?'<path d="M20 6 9 17l-5-5"/>':''}</svg>${opt.label}`;
      row.addEventListener('click',()=>{state.sort=on?null:opt;saveViewPrefs();closePopover();renderTasksView();});
      p.appendChild(row);
    });
    p.addEventListener('click',e=>e.stopPropagation());
    anchor.closest('.filter-bar').appendChild(p);activePopover=p;
  }

  function openGroupPopover(anchor){
    const p=document.createElement('div');p.className='popover';
    const rect=anchor.getBoundingClientRect(),barRect=anchor.closest('.filter-bar').getBoundingClientRect();
    p.style.left=`${rect.left-barRect.left}px`;
    p.innerHTML=`<div class="popover-label" style="margin-bottom:6px;font-size:13px;font-weight:600;color:var(--text)">Group by</div>`;
    [['status','Status'],['priority','Priority'],['owner','Owner'],['none','No grouping']].forEach(([v,l])=>{
      const on=state.groupBy===v;
      const row=document.createElement('button');row.className='sort-option'+(on?' on':'');
      row.innerHTML=`<svg class="sort-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">${on?'<path d="M20 6 9 17l-5-5"/>':''}</svg>${l}`;
      row.addEventListener('click',()=>{state.groupBy=v;saveViewPrefs();closePopover();renderTasksView();});
      p.appendChild(row);
    });
    p.addEventListener('click',e=>e.stopPropagation());
    anchor.closest('.filter-bar').appendChild(p);activePopover=p;
  }

  // ============================================================
  // KANBAN VIEW
  // ============================================================
  function renderKanban(container){
    container.className='kanban-wrap';
    const kanban=document.createElement('div');kanban.className='kanban';container.appendChild(kanban);
    const tempGroupBy=state.groupBy==='none'?'status':state.groupBy;
    const tasks=computedTasks();
    const savedGroupBy=state.groupBy;
    state.groupBy=tempGroupBy;
    const groups=groupedTasks(tasks);
    state.groupBy=savedGroupBy;
    groups.forEach(group=>{
      const colEl=document.createElement('div');colEl.className='kanban-column';colEl.dataset.group=group.key;
      const headerColor=groupHeaderStyle(group.key,tempGroupBy);
      const canQuickCreate=!state.boardLocked && ['status','priority','owner'].includes(tempGroupBy);
      colEl.innerHTML=`<div class="column-header"><span class="column-title" style="${headerColor}">${escapeHtml(group.label)}</span><span class="column-count">${group.tasks.length}</span>${canQuickCreate?'<button class="task-quick-create" title="Add task here"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button>':''}</div><div class="column-cards"></div>`;
      const cardsEl=colEl.querySelector('.column-cards');
      if(!group.tasks.length){
        const e=document.createElement('div');e.className='empty-state';e.innerHTML=`<span class="empty-icon">∅</span> No tasks here`;cardsEl.appendChild(e);
      }else{
        group.tasks.forEach(t=>cardsEl.appendChild(buildKanbanCard(t)));
      }
      colEl.querySelector('.task-quick-create')?.addEventListener('click',()=>{
        const overrides={};
        if(tempGroupBy==='status')overrides.status=group.key;
        if(tempGroupBy==='priority')overrides.priority=group.key;
        if(tempGroupBy==='owner'&&group.key!=='Unassigned')overrides.owner=group.key;
        createTask(overrides);
      });
      if(tempGroupBy==='status'){
        colEl.addEventListener('dragover',e=>{
          if(!e.dataTransfer.types.includes('text/plain'))return;
          e.preventDefault();colEl.classList.add('drag-over');
        });
        colEl.addEventListener('dragleave',e=>{if(!colEl.contains(e.relatedTarget))colEl.classList.remove('drag-over');});
        colEl.addEventListener('drop',e=>{
          e.preventDefault();colEl.classList.remove('drag-over');
          const raw=e.dataTransfer.getData('text/plain');
          if(raw&&raw.startsWith('task:')){
            const id=raw.slice(5);
            updateTask(id,{status:group.key});
          }
        });
      }
      kanban.appendChild(colEl);
    });
    const focusTaskId=consumeTaskFocus('detail');
    if(focusTaskId){requestAnimationFrame(()=>{const freshTask=state.tasks.find(t=>t.id===focusTaskId);if(freshTask)openTaskDetail(focusTaskId);});}
  }
  function groupHeaderStyle(key,gb){
    if(gb==='priority'){
      const c={urgent:'#9d174d',high:'var(--danger)',medium:'var(--warning)',low:'var(--text-muted)'};
      return`color:${c[key]||'var(--text)'}`;
    }
    if(gb==='status'){
      const c={todo:'var(--text-muted)',doing:'var(--info)',done:'var(--success)',blocked:'var(--danger)'};
      return`color:${c[key]||'var(--text)'}`;
    }
    return'';
  }
  function buildKanbanCard(task){
    const card=document.createElement('div');
    card.className='kanban-card';card.draggable=!state.boardLocked;card.dataset.id=task.id;
    const due=task.dueDate?`<span class="due-badge ${dueBadgeClass(task.dueDate)}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>${formatDate(task.dueDate)}</span>`:'';
    const owner=task.owner?`<span class="owner-badge"><span class="owner-av">${escapeHtml((task.owner[0]||'?').toUpperCase())}</span><span style="overflow:hidden;text-overflow:ellipsis">${escapeHtml(task.owner.split('@')[0]||task.owner)}</span></span>`:'';
    const tags=(task.tags||[]).slice(0,2).map(t=>`<span class="tag-chip">${escapeHtml(t)}</span>`).join('');
    const moreTags=(task.tags||[]).length>2?`<span style="font-size:10px;color:var(--text-faint)">+${task.tags.length-2}</span>`:'';
    card.innerHTML=`
      <button class="card-open-btn" title="Open detail"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></button>
      <div class="card-title">${escapeHtml(task.title||'Untitled task')}</div>
      <div class="card-meta">
        <select class="status-pill pill-${task.status||'todo'}" style="font-size:11px;padding:2px 8px">
          <option value="todo" ${task.status==='todo'?'selected':''}>To do</option>
          <option value="doing" ${task.status==='doing'?'selected':''}>In progress</option>
          <option value="done" ${task.status==='done'?'selected':''}>Done</option>
          <option value="blocked" ${task.status==='blocked'?'selected':''}>Blocked</option>
        </select>
        <span class="priority-pill pill-${task.priority||'medium'}">${capitalize(task.priority||'medium')}</span>
        ${due}${owner}${tags}${moreTags}
      </div>`;
    card.querySelector('.card-open-btn').addEventListener('click',e=>{e.stopPropagation();openTaskDetail(task.id);});
    card.querySelector('select').addEventListener('change',e=>{e.stopPropagation();updateTask(task.id,{status:e.target.value});});
    card.querySelector('select').addEventListener('mousedown',e=>e.stopPropagation());
    if(!state.boardLocked){
      card.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain','task:'+task.id);e.dataTransfer.effectAllowed='move';card.classList.add('dragging');});
      card.addEventListener('dragend',()=>card.classList.remove('dragging'));
    }
    card.addEventListener('click',e=>{if(!e.target.closest('.card-open-btn')&&!e.target.closest('select'))openTaskDetail(task.id);});
    return card;
  }
  function capitalize(s){return s?s[0].toUpperCase()+s.slice(1):s}

  // ============================================================
  // LIST VIEW
  // ============================================================
  function renderTaskList(container){
    const cols='minmax(116px, 130px) minmax(260px, 2fr) minmax(120px, .9fr) minmax(130px, 1fr) minmax(118px, .85fr) minmax(108px, .7fr) 64px';
    container.style.setProperty('--list-cols',cols);
    container.className='task-table';
    const head=document.createElement('div');head.className='task-table-head';
    head.style.setProperty('--list-cols',cols);
    head.innerHTML=`
      <div class="th">Status</div>
      <div class="th sortable" data-sort="title">Title ${state.sort?.field==='title'?'<span class="th-sort">'+(state.sort.dir==='asc'?'↑':'↓')+'</span>':''}</div>
      <div class="th">Owner</div>
      <div class="th">Tags</div>
      <div class="th sortable" data-sort="dueDate">Due date ${state.sort?.field==='dueDate'?'<span class="th-sort">'+(state.sort.dir==='asc'?'↑':'↓')+'</span>':''}</div>

    head.querySelectorAll('[data-sort]').forEach(th=>th.addEventListener('click',()=>{
      const field=th.dataset.sort;
      if(state.sort?.field===field){state.sort=state.sort.dir==='asc'?{field,dir:'desc'}:null;}
      else state.sort={field,dir:'asc'};

    }));
    container.appendChild(head);

      const e=document.createElement('div');e.className='empty-state';e.style.padding='40px';

    groups.forEach(group=>{
      if(groups.length>1){
        const gh=document.createElement('div');gh.className='task-group-header';gh.style.setProperty('--list-cols',cols);
        const hStyle=groupHeaderStyle(group.key,state.groupBy);
        gh.innerHTML=`<span style="${hStyle};font-weight:700">${escapeHtml(group.label)}</span><span class="task-group-count">${group.tasks.length}</span>`;
        container.appendChild(gh);
      }
      group.tasks.forEach(task=>{
        const row=document.createElement('div');row.className='task-row';row.dataset.taskId=task.id;row.style.setProperty('--list-cols',cols);

        const owner=task.owner?`<div class="owner-badge"><span class="owner-av">${(task.owner[0]||'?').toUpperCase()}</span><span>${escapeHtml(task.owner.split('@')[0]||task.owner)}</span></div>`:'<span style="color:var(--text-faint);font-size:12px">—</span>';
        const tags=(task.tags||[]).length>0?`<div style="display:flex;gap:3px;flex-wrap:wrap">${(task.tags||[]).slice(0,2).map(t=>`<span class="tag-chip">${escapeHtml(t)}</span>`).join('')}${(task.tags||[]).length>2?`<span style="font-size:10px;color:var(--text-faint)">+${task.tags.length-2}</span>`:''}</div>`:'<span style="color:var(--text-faint);font-size:12px">—</span>';
        row.innerHTML=`
          <div class="tr-cell">
            <select class="status-pill pill-${task.status||'todo'}">
              <option value="todo" ${task.status==='todo'?'selected':''}>To do</option>
              <option value="doing" ${task.status==='doing'?'selected':''}>In progress</option>
              <option value="done" ${task.status==='done'?'selected':''}>Done</option>
              <option value="blocked" ${task.status==='blocked'?'selected':''}>Blocked</option>
            </select>
          </div>
          <div class="tr-cell"><input class="task-title-input" value="${escapeAttr(task.title||'')}" ${state.boardLocked?'readonly':''}></div>
          <div class="tr-cell">${owner}</div>
          <div class="tr-cell">${tags}</div>
          <div class="tr-cell">${due}</div>
          <div class="tr-cell">
            <select class="priority-pill pill-${task.priority||'medium'}">
              <option value="urgent" ${task.priority==='urgent'?'selected':''}>Urgent</option>
              <option value="high" ${task.priority==='high'?'selected':''}>High</option>
              <option value="medium" ${task.priority==='medium'?'selected':''}>Medium</option>
              <option value="low" ${task.priority==='low'?'selected':''}>Low</option>
            </select>

        const st=row.querySelector('.status-pill');const pri=row.querySelector('.priority-pill');

        let tt;
        ti.addEventListener('input',()=>{clearTimeout(tt);tt=setTimeout(()=>updateTask(task.id,{title:ti.value}),350);});

      });

    const focusTaskId=consumeTaskFocus('list');
    if(focusTaskId){
      const targetRow=container.querySelector(`.task-row[data-task-id="${focusTaskId}"]`);
      const input=targetRow?.querySelector('.task-title-input');
      if(input){requestAnimationFrame(()=>{input.focus();input.select();input.scrollIntoView({block:'center',behavior:'smooth'});});}
    }
  }

  // ============================================================
  // CALENDAR VIEW (month grid of tasks by due date)
  // ============================================================
  function renderCalendar(container){
    const tasks=getFilteredSortedTasks().filter(t=>t.dueDate);

    // Determine month/year — state.calendarMonth or current month
    const today=new Date();
    let cm=state.calendarMonth;
    if(!cm){cm={year:today.getFullYear(),month:today.getMonth()};state.calendarMonth=cm;}
    const{year,month}=cm;

    const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
    const weekdayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    // Build wrapper
    const wrap=document.createElement('div');wrap.className='calendar-wrap';

    // Header
    const header=document.createElement('div');header.className='calendar-header';
    const prevBtn=document.createElement('button');prevBtn.className='calendar-nav-btn';prevBtn.title='Previous month';
    prevBtn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>';
    prevBtn.addEventListener('click',()=>{
      const m=cm.month===0?11:cm.month-1;
      const y=cm.month===0?cm.year-1:cm.year;
      state.calendarMonth={year:y,month:m};renderTasksView();
    });
    const label=document.createElement('div');label.className='calendar-month-label';
    label.textContent=`${monthNames[month]} ${year}`;
    const nextBtn=document.createElement('button');nextBtn.className='calendar-nav-btn';nextBtn.title='Next month';
    nextBtn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>';
    nextBtn.addEventListener('click',()=>{
      const m=cm.month===11?0:cm.month+1;
      const y=cm.month===11?cm.year+1:cm.year;
      state.calendarMonth={year:y,month:m};renderTasksView();
    });
    const todayBtn=document.createElement('button');todayBtn.className='calendar-today-btn';
    todayBtn.textContent='Today';
    todayBtn.addEventListener('click',()=>{
      state.calendarMonth={year:today.getFullYear(),month:today.getMonth()};renderTasksView();
    });
    header.appendChild(prevBtn);
    header.appendChild(label);
    header.appendChild(todayBtn);
    header.appendChild(nextBtn);
    wrap.appendChild(header);

    // Weekday header
    const wd=document.createElement('div');wd.className='calendar-weekdays';
    weekdayNames.forEach(n=>{const cell=document.createElement('div');cell.className='calendar-weekday';cell.textContent=n;wd.appendChild(cell);});
    wrap.appendChild(wd);

    // Grid
    const grid=document.createElement('div');grid.className='calendar-grid';

    const firstOfMonth=new Date(year,month,1);
    const startWeekday=firstOfMonth.getDay(); // 0=Sun
    // First grid cell starts at the Sunday before/on firstOfMonth
    const gridStart=new Date(year,month,1-startWeekday);

    // Compute how many rows we need: 6 to always fit, 5 if month fits in 5
    const lastOfMonth=new Date(year,month+1,0);
    const totalDaysShown=startWeekday+lastOfMonth.getDate();
    const rows=totalDaysShown>35?6:5;
    const totalCells=rows*7;

    // Bucket tasks by YYYY-MM-DD
    const taskByDay={};
    tasks.forEach(t=>{
      const k=t.dueDate; // already YYYY-MM-DD
      if(!taskByDay[k])taskByDay[k]=[];
      taskByDay[k].push(t);
    });

    const todayKey=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

    for(let i=0;i<totalCells;i++){
      const cellDate=new Date(gridStart);cellDate.setDate(gridStart.getDate()+i);
      const isOutside=cellDate.getMonth()!==month;
      const dayKey=`${cellDate.getFullYear()}-${String(cellDate.getMonth()+1).padStart(2,'0')}-${String(cellDate.getDate()).padStart(2,'0')}`;
      const isToday=dayKey===todayKey;

      const cell=document.createElement('div');
      cell.className='calendar-day'+(isOutside?' outside':'')+(isToday?' today':'');
      cell.dataset.date=dayKey;

      const num=document.createElement('div');num.className='calendar-daynum';
      num.textContent=cellDate.getDate();
      cell.appendChild(num);

      const cellTasks=taskByDay[dayKey]||[];
      const visibleCount=3;
      cellTasks.slice(0,visibleCount).forEach(t=>{
        const chip=document.createElement('div');
        chip.className='calendar-task pri-'+(t.priority||'none')+(t.status==='done'?' done':'');
        chip.textContent=t.title||'Untitled';
        chip.title=`${t.title||'Untitled'}${t.priority?` · ${t.priority}`:''}${t.status?` · ${t.status}`:''}`;
        chip.addEventListener('click',e=>{e.stopPropagation();openTaskDetail(t.id);});
        cell.appendChild(chip);
      });
      if(cellTasks.length>visibleCount){
        const more=document.createElement('div');more.className='calendar-more';
        more.textContent=`+${cellTasks.length-visibleCount} more`;
        more.addEventListener('click',e=>{e.stopPropagation();
          // Open the first hidden task; user can browse from there
          openTaskDetail(cellTasks[visibleCount].id);
        });
        cell.appendChild(more);
      }

      // Click empty cell area → create new task pre-dated to that day
      cell.addEventListener('click',e=>{
        if(e.target!==cell&&e.target!==num)return;
        if(state.boardLocked){toast('Board is locked');return;}
        createTask({dueDate:dayKey,status:'todo',priority:'medium'});
      });

      grid.appendChild(cell);
    }
    wrap.appendChild(grid);

    // Legend
    const legend=document.createElement('div');legend.className='calendar-legend';
    legend.innerHTML=`
      <span class="calendar-legend-item"><span class="calendar-legend-dot" style="border-left-color:#be185d;background:var(--tag-pink-bg)"></span>Urgent</span>
      <span class="calendar-legend-item"><span class="calendar-legend-dot" style="border-left-color:#b91c1c;background:var(--tag-red-bg)"></span>High</span>
      <span class="calendar-legend-item"><span class="calendar-legend-dot" style="border-left-color:#a16207;background:var(--tag-yellow-bg)"></span>Medium</span>
      <span class="calendar-legend-item"><span class="calendar-legend-dot" style="border-left-color:#475569;background:var(--tag-gray-bg)"></span>Low</span>
      <span style="margin-left:auto">${tasks.length} dated · ${getFilteredSortedTasks().length-tasks.length} undated (hidden)</span>
    `;
    wrap.appendChild(legend);

    container.appendChild(wrap);
  }

    state.openTaskId=taskId;

    if(!task)return;
    const panel=$('taskDetailPanel'),backdrop=$('taskDetailBackdrop');
    panel.style.display='flex';backdrop.style.display='block';
    renderDetailPanel(task);
    requestAnimationFrame(()=>{
      const titleEl=$('detailTitle');
      if(titleEl){
        titleEl.focus();
        if((task.title||'')==='New task')titleEl.select();
      }
    });
  }

    state.openTaskId=null;
    $('taskDetailPanel').style.display='none';
    $('taskDetailBackdrop').style.display='none';

    if(!items.length){
      const e=document.createElement('div');e.className='system-empty';
      e.innerHTML=`<span class="empty-icon">∅</span>No recently opened pages yet.`;
      wrap.appendChild(e);
    }else{
      const list=document.createElement('div');list.className='recent-list';
      items.forEach(page=>{

    wrap.innerHTML=`<h2 class="system-view-title">Archive</h2><p class="system-view-sub">Restore items or delete them permanently.</p>`;

    tabs.innerHTML=`

        wrap.appendChild(e);
      }else{

          const item=document.createElement('div');item.className='archive-item';
          item.innerHTML=`

              <div class="archive-item-sub">archived ${archived||'recently'}</div>
            </div>
            <div class="archive-item-actions">
              <button class="archive-action-btn" data-action="restore"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9"/><polyline points="3 4 3 12 11 12"/></svg>Restore</button>
              <button class="archive-action-btn danger" data-action="delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>Delete forever</button>
            </div>`;

          const userName=(a.user||'').split('@')[0]||a.user||'someone';

    if(!actions.length&&!mp.length&&!mt.length&&!recentPages.length){c.innerHTML='<div class="search-empty">No results found</div>';return;}

      const l=document.createElement('div');l.className='search-group-label';l.textContent='Actions';c.appendChild(l);

    }
    if(mp.length){
      const l=document.createElement('div');l.className='search-group-label';l.textContent='Pages';c.appendChild(l);

    if(mt.length){

        const item=document.createElement('button');item.className='search-result';
        item.innerHTML=`<svg class="search-result-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/></svg><div><div class="search-result-title">${escapeHtml(task.title||'Untitled task')}</div><div class="search-result-sub">${task.status||'todo'} · ${task.priority||'medium'}</div></div>`;

  $('searchInput').addEventListener('keydown',e=>{
    const results=$('searchResults').querySelectorAll('.search-result');
    if(e.key==='ArrowDown'){e.preventDefault();searchFocusIdx=Math.min(searchFocusIdx+1,results.length-1);}
    else if(e.key==='ArrowUp'){e.preventDefault();searchFocusIdx=Math.max(searchFocusIdx-1,-1);}

  function confirmModal(title,body,onConfirm,opts={}){
    const confirmText=opts.confirmText||'Delete';
    const variant=opts.variant||'danger';  // 'danger' | 'confirm'
    const btnClass=variant==='confirm'?'btn-confirm':'btn-danger';
    const backdrop=document.createElement('div');backdrop.className='modal-backdrop';
    backdrop.innerHTML=`<div class="modal"><h3>${escapeHtml(title)}</h3><p>${escapeHtml(body)}</p><div class="modal-actions"><button class="btn-secondary" data-action="cancel">Cancel</button><button class="${btnClass}" data-action="confirm">${escapeHtml(confirmText)}</button></div></div>`;
    document.body.appendChild(backdrop);
    backdrop.addEventListener('click',e=>{
      if(e.target===backdrop||e.target.dataset.action==='cancel')backdrop.remove();
      else if(e.target.dataset.action==='confirm'){backdrop.remove();onConfirm();}
    });
  }

  // ============================================================

  // ============================================================
  $('exportBtn').addEventListener('click',async()=>{
    try{
      const pages=[];
      for(const p of state.pages){
        const bs=await getDocs(query(collection(db,'workspace','main','pages',p.id,'blocks'),orderBy('order')));
        pages.push({...p,blocks:bs.docs.map(d=>({id:d.id,...d.data()}))});
      }
      const data={exportedAt:new Date().toISOString(),exportedBy:state.user.email,version:3,pages,tasks:state.tasks};
      const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download=`workspace-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);
      toast('Backup downloaded');
    }catch(err){console.error(err);toast('Backup failed');}
  });
  $('importBtn').addEventListener('click',()=>$('importFileInput').click());
  $('importFileInput').addEventListener('change',async e=>{
    const file=e.target.files[0];if(!file)return;
    try{
      const data=JSON.parse(await file.text());
      if(!data.pages||!data.tasks)throw new Error('Invalid');
      confirmModal('Import backup?',`Adds ${data.pages.length} pages and ${data.tasks.length} tasks. Existing data not deleted.`,async()=>{
        const batch=writeBatch(db);
        data.tasks.forEach(t=>{const{id,...rest}=t;const ref=doc(collection(db,'workspace','main','tasks'));batch.set(ref,{...rest,importedAt:serverTimestamp()});});
        await batch.commit();
        for(const p of data.pages){
          const{id,blocks,...pd}=p;const pr=await addDoc(collection(db,'workspace','main','pages'),{...pd,importedAt:serverTimestamp()});
          if(Array.isArray(blocks)&&blocks.length){const bb=writeBatch(db);blocks.forEach(b=>{const{id:bid,...br}=b;const r=doc(collection(db,'workspace','main','pages',pr.id,'blocks'));bb.set(r,br);});await bb.commit();}
        }
        toast(`Imported ${data.pages.length} pages, ${data.tasks.length} tasks`);
      },{confirmText:'Import',variant:'confirm'});
    }catch{toast('Import failed — invalid file');}
    finally{e.target.value='';}
  });

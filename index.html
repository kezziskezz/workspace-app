<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#fbfaf7" />
  <title>Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* =========================================================
       DARK + RESPONSIVE WORKSPACE
       Dark navy palette, amber accent, layout scales with viewport.
       ========================================================= */
    :root {
      color-scheme: light;

      --bg: #fbfaf7;            /* warm off-white canvas */
      --bg-elevated: #ffffff;   /* cards, modals, popovers */
      --bg-subtle: #f3f1ec;     /* chip/input backgrounds */
      --bg-sidebar: #f7f5f0;    /* slightly warmer left rail */
      --bg-hover: rgba(15, 23, 42, 0.04);
      --bg-active: rgba(15, 23, 42, 0.07);

      --text: #1a1d24;
      --text-muted: #4a5363;
      --text-faint: #7c8597;
      --text-placeholder: #a8aebc;

      --border: rgba(15, 23, 42, 0.08);
      --border-strong: rgba(15, 23, 42, 0.16);
      --divider: rgba(15, 23, 42, 0.06);

      --accent: #d97706;          /* slightly deeper amber for AAA contrast on light bg */
      --accent-hover: #b45309;
      --accent-soft: rgba(217, 119, 6, 0.18);
      --accent-faint: rgba(217, 119, 6, 0.08);

      /* Pastel fills with strong text for readability on white */
      --tag-gray-bg: #e9ecf2;     --tag-gray-text: #475569;
      --tag-blue-bg: #dbeafe;     --tag-blue-text: #1d4ed8;
      --tag-green-bg: #dcfce7;    --tag-green-text: #15803d;
      --tag-red-bg: #fee2e2;      --tag-red-text: #b91c1c;
      --tag-yellow-bg: #fef3c7;   --tag-yellow-text: #a16207;
      --tag-orange-bg: #fed7aa;   --tag-orange-text: #c2410c;
      --tag-purple-bg: #ede9fe;   --tag-purple-text: #7c3aed;
      --tag-pink-bg: #fce7f3;     --tag-pink-text: #be185d;

      --success: #16a34a;   --success-soft: #dcfce7;
      --warning: #d97706;   --warning-soft: #fef3c7;
      --danger: #dc2626;    --danger-soft: #fee2e2;
      --info: #2563eb;      --info-soft: #dbeafe;

      --radius-sm: 3px;
      --radius: 5px;
      --radius-lg: 8px;
      --radius-xl: 12px;

      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08), 0 0 0 1px rgba(15, 23, 42, 0.04);
      --shadow-lg: 0 16px 48px rgba(15, 23, 42, 0.12), 0 0 0 1px rgba(15, 23, 42, 0.06);

      --font-body: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-display: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, monospace;

      /* Responsive sizing — wider clamps so everything from a 12" laptop to
         a 27" monitor lands somewhere comfortable. JS may override
         --sidebar-width via inline style on <html> to honor user resize. */
      --sidebar-width: clamp(220px, 15vw, 300px);
      --header-height: clamp(44px, 2.6vw, 54px);
      --page-max: clamp(680px, 65vw, 1100px);
      --page-pad-x: clamp(28px, 4.5vw, 120px);
      --page-pad-y: clamp(36px, 4vw, 84px);
      --tasks-pad-x: clamp(20px, 3vw, 56px);
      --tasks-pad-y: clamp(18px, 2vw, 30px);
      --font-base: clamp(14.5px, 0.16vw + 13.5px, 16.5px);
      --font-ui: clamp(13px, 0.12vw + 12.5px, 14.5px);
      --font-title: clamp(32px, 2.4vw + 20px, 48px);
      --font-section-title: clamp(26px, 1.6vw + 18px, 38px);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    html{background:var(--bg)}
    body{
      font-family:var(--font-body);
      background:
        radial-gradient(circle at top left, rgba(217, 119, 6, 0.04), transparent 30%),
        radial-gradient(circle at top right, rgba(96, 165, 250, 0.025), transparent 32%),
        var(--bg);
      color:var(--text);
      font-size:var(--font-base);
      line-height:1.55;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      overflow:hidden;
      letter-spacing:-0.003em;
    }
    button,input,textarea,select{font-family:inherit;font-size:inherit;color:inherit;caret-color:var(--accent)}
    button{background:none;border:none;cursor:pointer}
    input,textarea{background:none;border:none;outline:none;width:100%}
    [hidden]{display:none!important}
    kbd{
      font-family:var(--font-body);font-size:11px;
      background:var(--bg-hover);padding:2px 6px;border-radius:3px;
      color:var(--text-muted);box-shadow:inset 0 -1px 0 var(--border);
    }

    /* AUTH */
    .auth-screen{
      position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;
      background:radial-gradient(circle at 25% 20%, rgba(245, 158, 11, 0.08), transparent 36%),
                 radial-gradient(circle at 80% 80%, rgba(96, 165, 250, 0.05), transparent 36%),
                 var(--bg);
    }
    .auth-card{
      width:100%;max-width:400px;background:var(--bg-elevated);
      border:1px solid var(--border);border-radius:var(--radius-lg);
      padding:36px 32px;box-shadow:var(--shadow);
    }
    .auth-brand{font-size:32px;font-weight:700;line-height:1;margin-bottom:6px;letter-spacing:-0.02em}
    .auth-tagline{color:var(--text-muted);margin-bottom:28px;font-size:14px}
    .auth-tabs{display:flex;gap:4px;background:var(--bg-subtle);padding:3px;border-radius:var(--radius-lg);margin-bottom:20px}
    .auth-tab{flex:1;padding:8px;border-radius:var(--radius);font-weight:500;color:var(--text-muted);transition:all .12s;font-size:13.5px}
    .auth-tab.active{background:var(--bg-hover);color:var(--text)}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:6px;font-weight:500}
    .field input{
      width:100%;padding:10px 12px;
      border:1px solid var(--border-strong);border-radius:var(--radius);
      background:var(--bg-subtle);color:var(--text);
      transition:border-color .12s,box-shadow .12s;font-size:14px;
    }
    .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
    .btn-primary{
      width:100%;padding:11px;background:var(--accent);color:#ffffff;
      border-radius:var(--radius);font-weight:600;font-size:14px;
      transition:background .12s;margin-top:6px;
    }
    .btn-primary:hover{background:var(--accent-hover)}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed}
    .auth-error{background:var(--danger-soft);color:var(--danger);padding:9px 12px;border-radius:var(--radius);font-size:13px;margin-bottom:14px}

    /* Backdrop — always hidden on desktop, only used on mobile when sidebar is opened.
       Critical: this MUST be display:none by default so it doesn't take a grid slot. */
    .sidebar-backdrop{display:none}

    /* APP SHELL */
    .app{display:grid;grid-template-columns:var(--sidebar-width) 1fr;height:100vh;height:100dvh}
    .app.sidebar-collapsed{grid-template-columns:0 1fr}
    .app.sidebar-collapsed .sidebar{transform:translateX(-100%);opacity:0;pointer-events:none}

    /* SIDEBAR */
    .sidebar{
      background:var(--bg-sidebar);border-right:1px solid var(--divider);
      display:flex;flex-direction:column;overflow:hidden;
      transition:transform .18s,opacity .12s;
    }
    .sidebar-header{padding:0 14px;display:flex;align-items:center;justify-content:space-between;height:var(--header-height);flex-shrink:0}
    .brand{font-size:15px;font-weight:600;letter-spacing:-0.01em;color:var(--text)}
    .icon-btn{
      width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;
      border-radius:var(--radius);color:var(--text-muted);transition:background .12s,color .12s;
    }
    .icon-btn:hover{background:var(--bg-hover);color:var(--text)}
    .icon-btn svg{width:15px;height:15px}

    .sidebar-search{padding:0 8px 6px}
    .sb-search-btn{
      display:flex;align-items:center;gap:8px;width:100%;
      padding:6px 8px;border-radius:var(--radius);
      color:var(--text-muted);font-size:var(--font-ui);
      transition:background .12s,color .12s;
    }
    .sb-search-btn:hover{background:var(--bg-hover);color:var(--text)}
    .sb-search-btn svg{width:14px;height:14px;flex-shrink:0;opacity:.85}
    .sb-search-btn .sb-search-label{flex:1;text-align:left}
    .sb-search-btn kbd{font-size:10.5px;padding:1px 5px}

    .sidebar-nav{padding:1px 6px}
    .nav-item{
      display:flex;align-items:center;gap:7px;
      padding:5px 8px;border-radius:var(--radius);
      color:var(--text);font-size:var(--font-ui);font-weight:400;
      width:100%;text-align:left;position:relative;min-height:30px;
      transition:background .08s;cursor:pointer;
    }
    .nav-item:hover{background:var(--bg-hover)}
    .nav-item.active{background:var(--bg-active);font-weight:500}
    .nav-item .nav-icon{width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text-muted)}
    .nav-item.active .nav-icon{color:var(--accent)}
    .nav-item .nav-icon svg{width:14px;height:14px}
    .nav-item-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-0.003em}
    .nav-item-actions{display:none;gap:0;align-items:center}
    .nav-item:hover .nav-item-actions{display:flex}
    .nav-item-actions button{width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);color:var(--text-faint);transition:background .1s,color .1s}
    .nav-item-actions button:hover{background:var(--bg-active);color:var(--text)}
    .nav-item-actions svg{width:12px;height:12px}
    .nav-item.depth-1{padding-left:24px}
    .nav-item.depth-2{padding-left:40px}
    .nav-item.depth-3{padding-left:56px}
    .expand-btn{width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);color:var(--text-faint);font-size:8px;flex-shrink:0;transition:transform .12s,background .1s}
    .expand-btn:hover{background:var(--bg-hover);color:var(--text-muted)}
    .expand-btn.open{transform:rotate(90deg)}
    .expand-placeholder{width:18px;flex-shrink:0}
    .nav-pin-indicator{color:var(--accent);font-size:11px;flex-shrink:0;opacity:.85}
    .nav-item.dragging{opacity:.4}
    .nav-item.drop-before{box-shadow:inset 0 1.5px 0 var(--accent)}
    .nav-item.drop-after{box-shadow:inset 0 -1.5px 0 var(--accent)}

    .sidebar-section{padding:14px 6px 2px}
    .sidebar-section-label{display:flex;align-items:center;justify-content:space-between;padding:0 8px 4px;color:var(--text-faint);font-size:11.5px;font-weight:500}
    .sidebar-section-label .label-actions{display:flex;gap:0;opacity:0;transition:opacity .12s}
    .sidebar-section:hover .label-actions{opacity:1}
    .sidebar-section-label button{width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);color:var(--text-faint)}
    .sidebar-section-label button:hover{background:var(--bg-hover);color:var(--text)}
    .sidebar-section-label svg{width:12px;height:12px}
    .pages-section-wrap{flex:1;overflow-y:auto;padding-bottom:6px}
    .sidebar-empty{padding:4px 14px;color:var(--text-faint);font-size:12.5px}

    .sidebar-footer{margin-top:auto;padding:10px 12px;border-top:1px solid var(--divider);display:flex;align-items:center;gap:9px;flex-shrink:0}
    .avatar{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#ffffff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex-shrink:0}
    .user-info{flex:1;min-width:0}
    .user-email{font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);line-height:1.3}
    .user-status{font-size:11px;color:var(--text-faint);display:flex;align-items:center;gap:4px;line-height:1.2}
    .status-dot{width:6px;height:6px;border-radius:50%;background:var(--success);box-shadow:0 0 6px rgba(74, 222, 128, 0.4)}
    .status-dot.offline{background:var(--text-faint);box-shadow:none}

    /* CONTENT */
    .content{display:flex;flex-direction:column;overflow:hidden;background:transparent;min-width:0}
    .content-header{height:var(--header-height);display:flex;align-items:center;padding:0 16px;gap:6px;flex-shrink:0;border-bottom:1px solid var(--divider)}
    .menu-toggle{display:inline-flex;width:28px;height:28px;align-items:center;justify-content:center;border-radius:var(--radius);color:var(--text-muted)}
    .menu-toggle:hover{background:var(--bg-hover);color:var(--text)}
    .menu-toggle svg{width:16px;height:16px}
    .breadcrumb{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13.5px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:0}
    .breadcrumb .bc-sep{color:var(--text-faint);margin:0 6px;font-weight:400}
    .breadcrumb .bc-parent{color:var(--text-muted);font-weight:400;cursor:pointer;padding:2px 6px;border-radius:var(--radius-sm);transition:background .1s}
    .breadcrumb .bc-parent:hover{background:var(--bg-hover);color:var(--text)}
    .breadcrumb-icon{display:inline-flex;align-items:center;color:var(--text-faint);margin-right:6px}
    .breadcrumb-icon svg{width:14px;height:14px}
    .header-actions{display:flex;gap:1px;align-items:center}
    .content-body{flex:1;overflow-y:auto;overflow-x:hidden}

    /* PAGE EDITOR */
    .page-editor{max-width:var(--page-max);margin:0 auto;padding:var(--page-pad-y) var(--page-pad-x) 220px;position:relative}
    .page-title{font-family:var(--font-display);font-size:var(--font-title);font-weight:700;line-height:1.18;letter-spacing:-0.022em;margin-bottom:18px;width:100%;background:none;border:none;padding:0;color:var(--text)}
    .page-title:focus{outline:none}
    .page-title::placeholder{color:var(--text-placeholder)}
    .page-meta{color:var(--text-faint);font-size:12.5px;margin-bottom:24px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
    .page-meta-actions{display:flex;gap:4px;margin-left:auto}
    .page-meta-btn{padding:4px 10px;border-radius:var(--radius);font-size:12.5px;color:var(--text-muted);background:transparent;border:none;transition:background .1s,color .1s;display:inline-flex;align-items:center;gap:5px}
    .page-meta-btn:hover{background:var(--bg-hover);color:var(--text)}
    .page-meta-btn.pinned{color:var(--accent)}
    .page-meta-btn svg{width:13px;height:13px}

    .block{position:relative;padding:3px 2px;margin:1px 0;border-radius:3px}
    .block.dragging{opacity:.4}
    .block.drop-before::before{content:'';position:absolute;left:0;right:0;top:-2px;height:2px;background:var(--accent);border-radius:2px}
    .block.drop-after::after{content:'';position:absolute;left:0;right:0;bottom:-2px;height:2px;background:var(--accent);border-radius:2px}
    .block-controls{position:absolute;left:-46px;top:1px;display:flex;gap:0;align-items:center;opacity:0;transition:opacity .1s;pointer-events:none}
    .block:hover .block-controls{opacity:1;pointer-events:auto}
    .block-controls button{width:20px;height:24px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);color:var(--text-faint);transition:background .1s,color .1s}
    .block-controls button:hover{background:var(--bg-hover);color:var(--text)}
    .block-controls .block-drag-handle{cursor:grab}
    .block-controls .block-drag-handle:active{cursor:grabbing}
    .block-controls svg{width:14px;height:14px}

    .block-content{
      width:100%;display:block;
      background:none;border:none;resize:none;
      font-family:inherit;font-size:inherit;
      color:var(--text);
      outline:none;padding:3px 2px;line-height:1.6;
      min-height:1.6em;
    }
    .block-content::placeholder{color:var(--text-faint);opacity:1}
    .block-content:focus::placeholder{color:var(--text-placeholder)}

    /* Empty page hint — shown when a page has zero blocks (rare, since we
       auto-create a starter block, but covers the brief moment before that lands) */
    .page-empty-prompt{
      padding:6px 2px;font-size:var(--font-base);
      color:var(--text-faint);line-height:1.6;
    }
    .page-empty-prompt strong{
      font-weight:600;color:var(--accent);
      background:var(--accent-faint);
      padding:1px 6px;border-radius:var(--radius-sm);
    }

    .block[data-type="h1"] .block-content{font-size:clamp(26px,1.6vw + 14px,32px);font-weight:700;line-height:1.25;margin-top:32px;letter-spacing:-0.018em}
    .block[data-type="h2"] .block-content{font-size:clamp(22px,1.2vw + 12px,26px);font-weight:700;line-height:1.3;margin-top:24px;letter-spacing:-0.012em}
    .block[data-type="h3"] .block-content{font-size:clamp(18px,0.8vw + 10px,21px);font-weight:600;line-height:1.3;margin-top:18px;letter-spacing:-0.008em}

    .block[data-type="bullet"]{padding-left:0}
    .block[data-type="bullet"] .block-content{padding-left:28px}
    .block[data-type="bullet"]::before{content:"•";position:absolute;left:8px;top:3px;color:var(--text);font-size:18px;line-height:1}
    .block[data-type="todo"] .block-content{padding-left:28px}
    .block[data-type="todo"] .todo-checkbox{position:absolute;left:6px;top:8px;width:14px;height:14px;cursor:pointer;accent-color:var(--accent)}
    .block[data-type="todo"].checked .block-content{text-decoration:line-through;color:var(--text-faint)}
    .block[data-type="quote"]{border-left:3px solid var(--accent);padding-left:14px;margin-left:0}
    .block[data-type="quote"] .block-content{color:var(--text)}
    .block[data-type="divider"]{padding:8px 0}
    .block[data-type="divider"] .block-divider{height:1px;background:var(--border-strong)}

    .toggle-btn{position:absolute;left:4px;top:6px;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);color:var(--text-muted);font-size:9px;cursor:pointer;transition:background .1s}
    .toggle-btn:hover{background:var(--bg-hover)}
    .block[data-type="toggle"] .block-content{padding-left:28px}
    .block[data-type="toggle"].collapsed .block-content{display:none}
    .toggle-preview{padding:3px 0 3px 28px;color:var(--text-muted);font-size:14px;cursor:pointer}
    .block[data-type="toggle"]:not(.collapsed) .toggle-preview{display:none}

    .block-add-menu{position:relative;display:inline-block}
    .add-block-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;color:var(--text-faint);border-radius:var(--radius);font-size:14px;margin-top:8px;transition:background .1s,color .1s}
    .add-block-btn:hover{background:var(--bg-hover);color:var(--text)}
    .add-block-btn svg{width:14px;height:14px}
    .block-types{display:none;position:absolute;bottom:100%;left:0;margin-bottom:4px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:6px;min-width:200px;z-index:10}
    .block-types.open{display:block}
    .block-type{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:var(--radius);width:100%;text-align:left;font-size:13.5px;transition:background .08s}
    .block-type:hover{background:var(--bg-hover)}
    .block-type-icon{width:24px;height:24px;background:var(--bg-subtle);border-radius:var(--radius-sm);display:inline-flex;align-items:center;justify-content:center;color:var(--text-muted);font-weight:600;font-size:12px}
    .add-subpage-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;color:var(--text-faint);border-radius:var(--radius);font-size:14px;margin-top:4px;transition:background .1s,color .1s}
    .add-subpage-btn:hover{background:var(--bg-hover);color:var(--text)}
    .add-subpage-btn svg{width:14px;height:14px}

    /* TASKS */
    .tasks-view{padding:var(--tasks-pad-y) var(--tasks-pad-x) 32px;height:100%;display:flex;flex-direction:column;min-height:0;max-width:1600px;margin:0 auto;width:100%}
    .tasks-title-row{display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-shrink:0}
    .tasks-title{font-size:var(--font-section-title);font-weight:700;letter-spacing:-0.018em;color:var(--text)}
    .lock-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:var(--tag-orange-bg);color:var(--tag-orange-text);border-radius:var(--radius);font-size:11.5px;font-weight:500}
    .lock-badge svg{width:11px;height:11px}

    .filter-bar{display:flex;align-items:center;gap:6px;padding:8px 0 12px;flex-shrink:0;flex-wrap:wrap;border-bottom:1px solid var(--divider);margin-bottom:14px;position:relative}
    .view-toggle{display:flex;background:var(--bg-subtle);padding:2px;border-radius:var(--radius)}
    .view-toggle button{padding:5px 11px;border-radius:3px;font-size:12.5px;color:var(--text-muted);transition:all .1s;display:inline-flex;align-items:center;gap:5px}
    .view-toggle button.active{background:var(--bg-hover);color:var(--text)}
    .view-toggle svg{width:12px;height:12px}
    .fb-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:var(--radius);font-size:12.5px;color:var(--text-muted);background:transparent;border:none;transition:background .1s,color .1s;cursor:pointer;white-space:nowrap}
    .fb-btn:hover{background:var(--bg-hover);color:var(--text)}
    .fb-btn.has-value{background:var(--accent-faint);color:var(--accent)}
    .fb-btn svg{width:12px;height:12px}
    .fb-sep{width:1px;height:18px;background:var(--divider);margin:0 2px;flex-shrink:0}
    .fb-spacer{flex:1}
    .add-task-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;background:var(--accent);color:#ffffff;border-radius:var(--radius);font-weight:600;font-size:13px;flex-shrink:0;transition:background .12s}
    .add-task-btn:hover{background:var(--accent-hover)}
    .add-task-btn svg{width:13px;height:13px}
    .filter-chips{display:flex;flex-wrap:wrap;gap:5px;padding:0 0 8px;flex-shrink:0}
    .filter-chip{display:inline-flex;align-items:center;gap:5px;padding:2px 6px 2px 9px;background:var(--bg-subtle);border-radius:var(--radius);font-size:12px;color:var(--text-muted)}
    .filter-chip button{display:inline-flex;align-items:center;color:var(--text-faint);padding:0 1px}
    .filter-chip button:hover{color:var(--text)}
    .filter-chip svg{width:10px;height:10px}

    .popover{position:absolute;top:calc(100% + 4px);background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);z-index:200;min-width:300px;padding:10px;animation:slideUp .12s ease-out}
    @keyframes slideUp{from{transform:translateY(4px);opacity:0}to{transform:translateY(0);opacity:1}}
    .popover-section{margin-bottom:10px;padding:0 4px}
    .popover-section:last-child{margin-bottom:0}
    .popover-label{font-size:11.5px;font-weight:500;color:var(--text-faint);margin-bottom:6px}
    .popover-chips{display:flex;flex-wrap:wrap;gap:4px}
    .pchip{padding:3px 9px;border-radius:var(--radius);font-size:12px;font-weight:500;background:var(--bg-subtle);border:none;cursor:pointer;transition:background .1s,color .1s;color:var(--text-muted)}
    .pchip:hover{background:var(--bg-hover);color:var(--text)}
    .pchip.on{background:var(--accent-soft);color:var(--accent)}
    .popover-input{width:100%;padding:6px 10px;background:var(--bg-subtle);border:1px solid transparent;border-radius:var(--radius);font-size:13px;color:var(--text);transition:border-color .12s}
    .popover-input:focus{border-color:var(--accent);outline:none}
    .popover-row{display:flex;align-items:center;justify-content:space-between}
    .popover-row .popover-label{margin-bottom:0}
    .popover-clear{font-size:12px;color:var(--accent);cursor:pointer;font-weight:500}
    .popover-clear:hover{text-decoration:underline}
    .sort-option{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text-muted);transition:background .08s;width:100%}
    .sort-option:hover{background:var(--bg-hover);color:var(--text)}
    .sort-option.on{color:var(--accent)}
    .sort-option .sort-check{width:14px;height:14px;flex-shrink:0}

    .task-table{flex:1;overflow-y:auto;min-height:0}
    .task-table-head{display:grid;grid-template-columns:var(--list-cols);padding:7px 8px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:1;flex-shrink:0}
    .th{font-size:11.5px;font-weight:500;color:var(--text-faint);display:flex;align-items:center;gap:4px;white-space:nowrap;overflow:hidden}
    .th.sortable{cursor:pointer}
    .th.sortable:hover{color:var(--text-muted)}
    .th-sort{font-size:10px;color:var(--accent)}
    .task-group-header{display:flex;align-items:center;gap:8px;padding:14px 8px 4px;font-size:11.5px;font-weight:500;color:var(--text-muted);border-top:1px solid var(--divider);margin-top:6px}
    .task-group-header:first-child{border-top:none;margin-top:0}
    .task-group-count{background:var(--bg-subtle);padding:1px 7px;border-radius:999px;font-size:11px;color:var(--text-muted);font-weight:400}
    .task-row{display:grid;grid-template-columns:var(--list-cols);padding:7px 8px;border-bottom:1px solid var(--divider);transition:background .08s;align-items:center;cursor:default}
    .task-row:hover{background:var(--bg-hover)}
    .tr-cell{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:6px;min-width:0}
    .task-title-input{background:none;border:none;outline:none;font-size:14px;flex:1;min-width:0;padding:0;color:var(--text)}
    .task-row-actions{display:flex;gap:1px;opacity:0;transition:opacity .12s}
    .task-row:hover .task-row-actions{opacity:1}
    .row-action-btn{width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius);color:var(--text-muted)}
    .row-action-btn:hover{background:var(--bg-hover);color:var(--text)}
    .row-action-btn.danger:hover{background:var(--danger-soft);color:var(--danger)}
    .row-action-btn svg{width:13px;height:13px}

    .status-pill,.priority-pill{padding:2px 9px;border-radius:var(--radius);font-size:12px;font-weight:500;display:inline-flex;align-items:center;border:none;font-family:inherit;cursor:pointer;white-space:nowrap;line-height:1.5}
    .status-pill.pill-todo{background:var(--tag-gray-bg);color:var(--tag-gray-text)}
    .status-pill.pill-doing{background:var(--tag-blue-bg);color:var(--tag-blue-text)}
    .status-pill.pill-done{background:var(--tag-green-bg);color:var(--tag-green-text)}
    .status-pill.pill-blocked{background:var(--tag-red-bg);color:var(--tag-red-text)}
    .priority-pill.pill-urgent{background:var(--tag-pink-bg);color:var(--tag-pink-text)}
    .priority-pill.pill-high{background:var(--tag-red-bg);color:var(--tag-red-text)}
    .priority-pill.pill-medium{background:var(--tag-yellow-bg);color:var(--tag-yellow-text)}
    .priority-pill.pill-low{background:var(--tag-gray-bg);color:var(--tag-gray-text)}
    .due-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:var(--radius);font-size:11.5px;background:var(--bg-subtle);color:var(--text-muted);white-space:nowrap}
    .due-badge.overdue{background:var(--tag-red-bg);color:var(--tag-red-text)}
    .due-badge.due-soon{background:var(--tag-yellow-bg);color:var(--tag-yellow-text)}
    .due-badge svg{width:10px;height:10px}
    .owner-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;max-width:120px}
    .owner-badge .owner-av{width:18px;height:18px;border-radius:50%;background:var(--info);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;flex-shrink:0}
    .tag-chip{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;background:var(--tag-blue-bg);color:var(--tag-blue-text);border-radius:var(--radius);font-size:11.5px;font-weight:500;white-space:nowrap}

    .kanban-wrap{flex:1;overflow:hidden;min-height:0;display:flex;flex-direction:column}
    .kanban{flex:1;display:flex;gap:12px;overflow-x:auto;overflow-y:hidden;padding-bottom:6px;min-height:0}
    .kanban-column{min-width:280px;flex:1 1 280px;background:var(--bg-subtle);border-radius:var(--radius-lg);padding:10px;display:flex;flex-direction:column;overflow:hidden;transition:background .15s}
    .kanban-column.drag-over{background:var(--accent-faint);outline:2px dashed var(--accent);outline-offset:-2px}
    .column-header{display:flex;align-items:center;gap:8px;padding:4px 6px 10px;flex-shrink:0}
    .column-title{font-weight:600;font-size:12.5px;color:var(--text);letter-spacing:0.01em;text-transform:uppercase}
    .column-count{background:transparent;padding:0;font-size:12px;color:var(--text-faint);font-weight:400}
    .column-cards{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:7px;padding:2px}
    .kanban-card{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:11px 12px;box-shadow:var(--shadow-sm);cursor:grab;position:relative;transition:border-color .12s,background .12s,transform .12s;user-select:none}
    .kanban-card:hover{border-color:var(--border-strong);transform:translateY(-1px)}
    .kanban-card.dragging{opacity:.4;cursor:grabbing}
    .card-open-btn{position:absolute;top:7px;right:7px;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius);color:var(--text-faint);opacity:0;transition:opacity .12s,background .1s}
    .kanban-card:hover .card-open-btn{opacity:1}
    .card-open-btn:hover{background:var(--bg-hover);color:var(--text)}
    .card-open-btn svg{width:12px;height:12px}
    .card-title{font-weight:500;font-size:13.5px;margin-bottom:8px;padding-right:24px;line-height:1.4;color:var(--text)}
    .card-meta{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
    .empty-state{padding:32px 16px;text-align:center;color:var(--text-faint);font-size:12.5px}
    .empty-state .empty-icon{font-size:24px;color:var(--text-faint);margin-bottom:6px;display:block;opacity:.45}

    /* TASK DETAIL PANEL */
    .task-detail-panel{position:fixed;top:0;right:0;bottom:0;width:clamp(360px, 32vw, 480px);max-width:100vw;background:var(--bg-elevated);border-left:1px solid var(--border);box-shadow:var(--shadow-lg);z-index:80;display:flex;flex-direction:column;animation:slideFromRight .18s ease-out}
    @keyframes slideFromRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
    .task-detail-backdrop{position:fixed;inset:0;z-index:79;display:none}
    .detail-header{display:flex;align-items:flex-start;gap:8px;padding:18px 22px 14px;flex-shrink:0;border-bottom:1px solid var(--divider)}
    .detail-close{width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius);color:var(--text-muted);flex-shrink:0;margin-top:4px}
    .detail-close:hover{background:var(--bg-hover);color:var(--text)}
    .detail-close svg{width:14px;height:14px}
    .detail-title{flex:1;font-size:22px;font-weight:700;background:none;border:none;outline:none;resize:none;font-family:inherit;line-height:1.3;padding:0;letter-spacing:-0.012em;color:var(--text)}
    .detail-title::placeholder{color:var(--text-placeholder)}
    .detail-body{flex:1;overflow-y:auto;padding:0}
    .detail-props{padding:6px 14px}
    .prop-row{display:flex;align-items:flex-start;padding:0;min-height:34px;transition:background .08s;border-radius:var(--radius)}
    .prop-row:hover{background:var(--bg-hover)}
    .prop-label{width:120px;flex-shrink:0;font-size:13px;color:var(--text-muted);font-weight:400;padding:8px;display:flex;align-items:center;gap:6px}
    .prop-label svg{width:13px;height:13px;color:var(--text-faint)}
    .prop-value{flex:1;padding:5px 8px;display:flex;align-items:center;flex-wrap:wrap;gap:4px;min-width:0}
    .prop-select{padding:3px 8px;background:transparent;border:1px solid transparent;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:inherit;transition:background .12s;-webkit-appearance:none}
    .prop-select:hover{background:var(--bg-hover)}
    .prop-input{flex:1;padding:5px 8px;background:transparent;border:1px solid transparent;border-radius:var(--radius-sm);font-size:13.5px;font-family:inherit;color:var(--text);transition:background .12s;min-width:0}
    .prop-input:hover{background:var(--bg-hover)}
    .prop-input:focus{border-color:var(--accent);background:var(--bg-subtle);outline:none}
    .prop-input[type="date"]{color-scheme:light}
    .tags-wrap{display:flex;flex-wrap:wrap;gap:4px;align-items:center;padding:5px 0}
    .detail-tag{display:inline-flex;align-items:center;gap:3px;padding:1px 6px 1px 8px;background:var(--tag-blue-bg);color:var(--tag-blue-text);border-radius:var(--radius);font-size:12px;font-weight:500}
    .detail-tag button{display:inline-flex;align-items:center;cursor:pointer;color:var(--tag-blue-text);opacity:.6;padding:0 1px}
    .detail-tag button:hover{opacity:1}
    .detail-tag svg{width:9px;height:9px}
    .tag-add-btn{padding:2px 9px;background:transparent;border:1px dashed var(--border-strong);border-radius:var(--radius);font-size:11.5px;color:var(--text-muted);cursor:pointer;transition:border-color .12s,color .1s}
    .tag-add-btn:hover{border-color:var(--accent);color:var(--accent)}
    .tag-add-input{padding:2px 9px;background:var(--bg-subtle);border:1px solid var(--accent);border-radius:var(--radius);font-size:12px;width:100px;color:var(--text)}
    .prop-meta{font-size:12.5px;color:var(--text-faint);padding:8px 0;line-height:1.6}
    .detail-section-label{padding:14px 22px 4px;font-size:11.5px;font-weight:500;color:var(--text-faint);border-top:1px solid var(--divider);margin-top:12px}
    .detail-actions-row{display:flex;gap:6px;padding:18px 22px;flex-shrink:0;flex-wrap:wrap}
    .detail-action-btn{padding:7px 12px;background:var(--bg-subtle);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;display:inline-flex;align-items:center;gap:6px;color:var(--text-muted);transition:all .12s;cursor:pointer}
    .detail-action-btn:hover{background:var(--bg-hover);color:var(--text);border-color:var(--border-strong)}
    .detail-action-btn.danger{color:var(--danger)}
    .detail-action-btn.danger:hover{background:var(--danger-soft);border-color:var(--danger)}
    .detail-action-btn svg{width:13px;height:13px}
    .detail-locked-note{margin:14px 22px;padding:10px 12px;background:var(--tag-orange-bg);border-radius:var(--radius);font-size:12.5px;color:var(--tag-orange-text);display:flex;align-items:center;gap:6px}
    .detail-locked-note svg{width:13px;height:13px;flex-shrink:0}

    /* MODAL */
    .modal-backdrop{position:fixed;inset:0;background:rgba(15, 23, 42, 0.32);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;padding:24px;z-index:100;animation:fadeIn .12s}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .modal{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;width:100%;max-width:440px;box-shadow:var(--shadow-lg);animation:slideUp .18s ease-out}
    .modal h3{font-size:19px;font-weight:600;margin-bottom:6px;letter-spacing:-0.01em}
    .modal p{color:var(--text-muted);margin-bottom:20px;font-size:13.5px;line-height:1.5}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
    .btn-secondary{padding:8px 14px;border-radius:var(--radius);background:var(--bg-subtle);color:var(--text-muted);font-weight:500;font-size:13.5px;transition:background .1s,color .1s;border:1px solid var(--border)}
    .btn-secondary:hover{background:var(--bg-hover);color:var(--text)}
    .btn-danger{padding:8px 14px;border-radius:var(--radius);background:var(--danger);color:#fff;font-weight:600;font-size:13.5px;transition:background .12s}
    .btn-danger:hover{background:#ef4444}
    .btn-confirm{padding:8px 14px;border-radius:var(--radius);background:var(--accent);color:#ffffff;font-weight:600;font-size:13.5px;transition:background .12s}
    .btn-confirm:hover{background:var(--accent-hover)}
    .modal .btn-primary{width:auto;padding:8px 14px;margin-top:0;font-size:13.5px}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg-elevated);border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:var(--radius);font-size:13px;box-shadow:var(--shadow);z-index:200;animation:toastIn .18s ease-out}
    @keyframes toastIn{from{transform:translate(-50%,8px);opacity:0}to{transform:translate(-50%,0);opacity:1}}

    /* SLASH MENU */
    .slash-menu{position:fixed;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:6px;min-width:240px;z-index:300;max-height:340px;overflow-y:auto;animation:slideUp .1s ease-out}
    .slash-section-label{padding:6px 10px 4px;font-size:11px;font-weight:500;color:var(--text-faint)}
    .slash-item{display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:var(--radius);width:100%;text-align:left;font-size:13.5px;cursor:pointer;transition:background .08s}
    .slash-item:hover{background:var(--bg-hover)}
    .slash-item.focused{
      background:var(--accent-soft);
      color:var(--text);
    }
    .slash-item-icon{width:36px;height:36px;background:var(--bg-subtle);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;color:var(--text-muted);font-weight:500}
    .slash-item.focused .slash-item-icon{background:var(--accent);color:#ffffff}
    .slash-item-name{font-weight:500;font-size:13.5px;line-height:1.3;color:var(--text)}
    .slash-item-desc{font-size:12px;color:var(--text-muted);margin-top:2px;line-height:1.3}
    .slash-no-results{padding:14px 12px;color:var(--text-muted);font-size:13px}

    /* SEARCH MODAL */
    .search-overlay{position:fixed;inset:0;background:rgba(15, 23, 42, 0.32);backdrop-filter:blur(2px);z-index:250;display:flex;align-items:flex-start;justify-content:center;padding-top:14vh;padding-left:16px;padding-right:16px;animation:fadeIn .12s}
    .search-modal{width:100%;max-width:580px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);overflow:hidden;animation:slideUp .18s ease-out}
    .search-input-wrap{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--divider)}
    .search-input-wrap svg{color:var(--text-muted);flex-shrink:0;width:16px;height:16px}
    .search-input-wrap input{flex:1;font-size:15px;background:none;border:none;outline:none;color:var(--text)}
    .search-input-wrap input::placeholder{color:var(--text-placeholder)}
    .search-input-wrap kbd{flex-shrink:0}
    .search-results{max-height:440px;overflow-y:auto;padding:6px}
    .search-group-label{padding:8px 12px 4px;font-size:11px;font-weight:500;color:var(--text-faint)}
    .search-result{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius);width:100%;text-align:left;cursor:pointer;transition:background .08s}
    .search-result:hover,.search-result.focused{background:var(--bg-hover)}
    .search-result-icon{color:var(--text-faint);width:14px;height:14px;flex-shrink:0}
    .search-result-title{font-weight:500;font-size:13.5px;color:var(--text)}
    .search-result-sub{font-size:11.5px;color:var(--text-muted);margin-top:1px}
    .search-result-path{font-size:11.5px;color:var(--text-faint)}
    .search-empty{padding:32px;text-align:center;color:var(--text-muted);font-size:13px}
    .search-hint{padding:10px 20px;border-top:1px solid var(--divider);display:flex;gap:14px;align-items:center}
    .search-hint-item{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--text-faint)}
    .search-hint kbd{font-size:10.5px}

    /* TEMPLATE MODAL */
    .template-overlay{position:fixed;inset:0;background:rgba(15, 23, 42, 0.32);backdrop-filter:blur(2px);z-index:250;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .12s}
    .template-modal{width:100%;max-width:600px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);overflow:hidden;animation:slideUp .18s ease-out}
    .template-header{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 16px;border-bottom:1px solid var(--divider)}
    .template-header h3{font-size:19px;font-weight:600;letter-spacing:-0.01em}
    .template-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:18px}
    .template-card{border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:left;cursor:pointer;background:var(--bg-subtle);transition:border-color .12s,background .12s,transform .12s}
    .template-card:hover{border-color:var(--accent);background:var(--accent-faint);transform:translateY(-1px)}
    .template-card-icon{font-size:24px;margin-bottom:8px;display:block}
    .template-card-name{font-weight:600;font-size:14px;margin-bottom:4px;color:var(--text)}
    .template-card-desc{font-size:12px;color:var(--text-muted);line-height:1.4}
    .template-empty-card{border:1px dashed var(--border-strong);border-radius:var(--radius);padding:16px;text-align:left;cursor:pointer;transition:border-color .12s,background .12s}
    .template-empty-card:hover{border-color:var(--accent);background:var(--accent-faint)}

    /* SHORTCUTS MODAL */
    .shortcuts-overlay{position:fixed;inset:0;background:rgba(15, 23, 42, 0.32);backdrop-filter:blur(2px);z-index:250;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .12s}
    .shortcuts-modal{width:100%;max-width:540px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);overflow:hidden;animation:slideUp .18s ease-out}
    .shortcuts-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 14px;border-bottom:1px solid var(--divider)}
    .shortcuts-header h3{font-size:19px;font-weight:600;letter-spacing:-0.01em}
    .shortcuts-body{padding:14px 22px 22px;max-height:60vh;overflow-y:auto}
    .shortcuts-section{margin-bottom:18px}
    .shortcuts-section:last-child{margin-bottom:0}
    .shortcuts-section-label{font-size:11px;font-weight:500;color:var(--text-faint);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.04em}
    .shortcut-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
    .shortcut-desc{font-size:13.5px;color:var(--text)}
    .shortcut-keys{display:flex;gap:3px;align-items:center}
    .shortcut-keys kbd{font-size:11px;padding:2px 7px}

    /* SYSTEM VIEWS */
    .system-view{padding:var(--page-pad-y) var(--page-pad-x) 60px;max-width:var(--page-max);margin:0 auto}
    .system-view-title{font-size:var(--font-section-title);font-weight:700;letter-spacing:-0.018em;margin-bottom:6px;color:var(--text)}
    .system-view-sub{color:var(--text-muted);font-size:13.5px;margin-bottom:28px}
    .system-empty{padding:48px;text-align:center;color:var(--text-faint);font-size:13.5px;border:1px dashed var(--border);border-radius:var(--radius-lg);background:transparent}
    .system-empty .empty-icon{font-size:32px;color:var(--text-faint);margin-bottom:8px;display:block;opacity:.45}

    .recent-list,.archive-list,.activity-list{display:flex;flex-direction:column;gap:0}
    .recent-item,.archive-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius);transition:background .1s;cursor:pointer}
    .recent-item:hover,.archive-item:hover{background:var(--bg-hover)}
    .recent-item-icon,.archive-item-icon{width:28px;height:28px;border-radius:var(--radius-sm);background:var(--bg-subtle);display:flex;align-items:center;justify-content:center;color:var(--text-muted);flex-shrink:0}
    .recent-item-icon svg,.archive-item-icon svg{width:13px;height:13px}
    .recent-item-body,.archive-item-body{flex:1;min-width:0}
    .recent-item-title,.archive-item-title{font-weight:500;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
    .recent-item-sub,.archive-item-sub{font-size:11.5px;color:var(--text-faint);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .archive-item-actions{display:flex;gap:4px;opacity:0;transition:opacity .12s}
    .archive-item:hover .archive-item-actions{opacity:1}
    .archive-action-btn{padding:5px 10px;border-radius:var(--radius);font-size:12px;color:var(--text-muted);background:var(--bg-subtle);border:1px solid var(--border);display:inline-flex;align-items:center;gap:4px;transition:all .1s}
    .archive-action-btn:hover{background:var(--bg-hover);color:var(--text);border-color:var(--border-strong)}
    .archive-action-btn.danger{color:var(--danger)}
    .archive-action-btn.danger:hover{background:var(--danger-soft);border-color:var(--danger)}
    .archive-action-btn svg{width:11px;height:11px}

    .archive-tabs{display:flex;gap:2px;background:var(--bg-subtle);padding:3px;border-radius:var(--radius);margin-bottom:18px;width:fit-content}
    .archive-tab{padding:6px 14px;border-radius:3px;font-size:13px;color:var(--text-muted);font-weight:500;transition:all .12s}
    .archive-tab.active{background:var(--bg-hover);color:var(--text)}

    .activity-day{margin-bottom:24px}
    .activity-day-label{font-size:11.5px;font-weight:500;color:var(--text-faint);padding:6px 0 8px;border-bottom:1px solid var(--divider);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.04em}
    .activity-row{display:flex;gap:10px;padding:6px 4px;align-items:flex-start}
    .activity-icon{width:24px;height:24px;border-radius:50%;background:var(--bg-subtle);display:flex;align-items:center;justify-content:center;color:var(--text-muted);flex-shrink:0;margin-top:2px;font-size:10px}
    .activity-icon svg{width:11px;height:11px}
    .activity-icon.color-create{background:var(--tag-green-bg);color:var(--tag-green-text)}
    .activity-icon.color-update{background:var(--tag-blue-bg);color:var(--tag-blue-text)}
    .activity-icon.color-archive{background:var(--tag-orange-bg);color:var(--tag-orange-text)}
    .activity-icon.color-delete{background:var(--tag-red-bg);color:var(--tag-red-text)}
    .activity-body{flex:1;min-width:0}
    .activity-text{font-size:13.5px;line-height:1.5;color:var(--text)}
    .activity-text strong{font-weight:500}
    .activity-time{font-size:11.5px;color:var(--text-faint);margin-top:1px}

    /* RESPONSIVE LIST VIEW */
    @media (max-width: 1100px){
      .task-table-head, .task-row{
        grid-template-columns:120px minmax(180px, 1.4fr) 100px 110px 100px 80px 60px !important;
      }
    }
    @media (max-width: 860px){
      .task-table-head, .task-row{
        grid-template-columns:110px minmax(160px, 1.4fr) 100px 110px 80px 60px !important;
      }
      .task-table-head .th:nth-child(4),
      .task-row > .tr-cell:nth-child(4){display:none}
    }

    /* MOBILE */
    @media(max-width:768px){
      :root{--sidebar-width:264px}
      /* Single-column grid; explicitly place content at row 1 so the sidebar's
         auto-placed (but fixed-positioned) grid slot doesn't push content to row 2. */
      .app{grid-template-columns:1fr;grid-template-rows:100dvh;grid-template-rows:100vh}
      .content{grid-row:1;grid-column:1;min-height:0}
      .sidebar{position:fixed;top:0;bottom:0;left:0;width:var(--sidebar-width);z-index:50;transform:translateX(-100%);transition:transform .22s ease-out;box-shadow:var(--shadow-lg)}
      .sidebar.open{transform:translateX(0)}
      .sidebar-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40;display:none}
      .sidebar-backdrop.open{display:block}
      .menu-toggle{display:inline-flex}
      .page-editor{padding:24px 18px 200px}
      .block-controls{display:none}
      .tasks-view{padding:16px 14px 24px}
      .system-view{padding:24px 18px 60px}
      .kanban{gap:8px}
      .kanban-column{min-width:240px;flex:0 0 240px}
      .task-detail-panel{width:100%}
      .task-detail-backdrop{display:block}
      .template-grid{grid-template-columns:1fr}
      .search-overlay{padding-top:8vh}
      .filter-bar{flex-wrap:wrap}
      .task-table-head, .task-row{
        grid-template-columns:90px minmax(140px, 1fr) 80px 70px 50px !important;
      }
      .task-table-head .th:nth-child(3),
      .task-table-head .th:nth-child(4),
      .task-row > .tr-cell:nth-child(3),
      .task-row > .tr-cell:nth-child(4){display:none}
    }
    @media(min-width:769px){
      .menu-toggle{display:none}
    }

    /* SCROLLBARS */
    ::-webkit-scrollbar{width:10px;height:10px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--bg-hover);border:2px solid transparent;border-radius:8px;background-clip:padding-box}
    ::-webkit-scrollbar-thumb:hover{background:var(--border-strong);background-clip:padding-box}

    ::selection{background:var(--accent-soft);color:var(--text)}

    /* ============== PROPERTY CLEAR BUTTONS (× to blank field) ============== */
    .prop-clear-btn{
      width:20px;height:20px;border-radius:var(--radius-sm);
      display:inline-flex;align-items:center;justify-content:center;
      color:var(--text-faint);flex-shrink:0;margin-left:4px;
      opacity:0;transition:opacity .12s,background .1s,color .1s;
    }
    .prop-row:hover .prop-clear-btn{opacity:1}
    .prop-clear-btn:hover{background:var(--bg-hover);color:var(--text)}
    .prop-clear-btn svg{width:11px;height:11px}

    /* ============== NONE / EMPTY PILL STATE ============== */
    .status-pill.pill-none,.priority-pill.pill-none{
      background:transparent;color:var(--text-faint);
      border:1px dashed var(--border-strong);
    }

    /* ============== TASK DESCRIPTION (rich notes on a task) ============== */
    .detail-description-wrap{
      padding:4px 22px 12px;
      border-bottom:1px solid var(--divider);
    }
    .detail-description{
      width:100%;background:transparent;
      border:none;outline:none;resize:none;
      font-family:inherit;font-size:13.5px;color:var(--text);
      line-height:1.55;padding:6px 0;
      min-height:42px;
    }
    .detail-description::placeholder{color:var(--text-placeholder)}

    /* ============== OWNER SUGGESTION CHIPS ============== */
    .detail-owner-quick{
      display:flex;flex-wrap:wrap;gap:5px;
      margin-top:8px;align-items:center;
    }
    .detail-owner-quick:empty{display:none}
    .detail-owner-quick-label{
      font-size:11px;color:var(--text-faint);
      margin-right:2px;font-weight:500;
    }
    .owner-suggestion-chip{
      display:inline-flex;align-items:center;
      padding:3px 9px;border-radius:var(--radius);
      font-size:11.5px;font-weight:500;
      background:var(--bg-subtle);color:var(--text-muted);
      border:1px solid var(--border);cursor:pointer;
      transition:background .12s,color .12s,border-color .12s;
      max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    }
    .owner-suggestion-chip:hover{
      background:var(--accent-faint);color:var(--accent);
      border-color:var(--accent);
    }

    /* ============== CALENDAR VIEW ============== */
    .calendar-wrap{
      flex:1;display:flex;flex-direction:column;
      min-height:0;overflow:hidden;
    }
    .calendar-header{
      display:flex;align-items:center;gap:8px;
      padding:6px 0 12px;flex-shrink:0;
    }
    .calendar-month-label{
      font-size:18px;font-weight:600;color:var(--text);
      letter-spacing:-0.012em;flex:1;
    }
    .calendar-nav-btn{
      width:30px;height:30px;
      display:inline-flex;align-items:center;justify-content:center;
      border-radius:var(--radius);border:1px solid var(--border);
      color:var(--text-muted);background:var(--bg-elevated);
      transition:background .12s,color .12s,border-color .12s;
    }
    .calendar-nav-btn:hover{background:var(--bg-hover);color:var(--text);border-color:var(--border-strong)}
    .calendar-nav-btn svg{width:14px;height:14px}
    .calendar-today-btn{
      padding:6px 12px;border:1px solid var(--border);
      border-radius:var(--radius);background:var(--bg-elevated);
      color:var(--text-muted);font-size:12.5px;font-weight:500;
      transition:background .1s,color .1s,border-color .1s;
    }
    .calendar-today-btn:hover{background:var(--bg-hover);color:var(--text);border-color:var(--border-strong)}

    .calendar-weekdays{
      display:grid;grid-template-columns:repeat(7,1fr);
      border-bottom:1px solid var(--border);
      flex-shrink:0;
    }
    .calendar-weekday{
      padding:8px 10px;font-size:11px;
      font-weight:500;color:var(--text-faint);
      text-transform:uppercase;letter-spacing:0.04em;
      text-align:left;
    }

    .calendar-grid{
      flex:1;display:grid;grid-template-columns:repeat(7,1fr);
      grid-auto-rows:1fr;
      border-left:1px solid var(--divider);
      border-top:1px solid var(--divider);
      overflow:auto;min-height:0;
    }
    .calendar-day{
      border-right:1px solid var(--divider);
      border-bottom:1px solid var(--divider);
      padding:6px 6px 4px;min-height:96px;
      display:flex;flex-direction:column;gap:3px;
      cursor:pointer;
      transition:background .1s;
      position:relative;
    }
    .calendar-day:hover{background:var(--bg-hover)}
    .calendar-day.outside{background:var(--bg-subtle);opacity:.55}
    .calendar-day.outside:hover{opacity:.85}
    .calendar-day.today{background:var(--accent-faint)}
    .calendar-day.today:hover{background:var(--accent-soft)}
    .calendar-daynum{
      font-size:12px;font-weight:500;
      color:var(--text-muted);
      width:22px;height:22px;
      display:inline-flex;align-items:center;justify-content:center;
      border-radius:50%;
    }
    .calendar-day.today .calendar-daynum{
      background:var(--accent);color:#ffffff;font-weight:600;
    }

    .calendar-task{
      padding:2px 6px;border-radius:var(--radius-sm);
      font-size:11.5px;font-weight:500;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      cursor:pointer;line-height:1.4;
      border-left:3px solid transparent;
      background:var(--bg-subtle);color:var(--text);
      transition:background .1s;
    }
    .calendar-task:hover{background:var(--bg-active);filter:brightness(0.97)}
    .calendar-task.done{opacity:.55;text-decoration:line-through}
    .calendar-task.pri-urgent{border-left-color:#be185d;background:var(--tag-pink-bg);color:var(--tag-pink-text)}
    .calendar-task.pri-high{border-left-color:#b91c1c;background:var(--tag-red-bg);color:var(--tag-red-text)}
    .calendar-task.pri-medium{border-left-color:#a16207;background:var(--tag-yellow-bg);color:var(--tag-yellow-text)}
    .calendar-task.pri-low{border-left-color:#475569;background:var(--tag-gray-bg);color:var(--tag-gray-text)}
    .calendar-task.pri-none{border-left-color:var(--text-faint)}

    .calendar-more{
      font-size:11px;color:var(--text-faint);
      padding:1px 6px;cursor:pointer;
    }
    .calendar-more:hover{color:var(--accent)}

    .calendar-legend{
      display:flex;gap:14px;align-items:center;
      padding:10px 0 0;flex-shrink:0;
      font-size:11.5px;color:var(--text-faint);
    }
    .calendar-legend-item{display:flex;align-items:center;gap:5px}
    .calendar-legend-dot{
      width:9px;height:9px;border-radius:2px;
      border-left:3px solid;
    }

    @media(max-width:768px){
      .calendar-day{min-height:64px;padding:4px}
      .calendar-daynum{width:18px;height:18px;font-size:11px}
      .calendar-task{font-size:10.5px;padding:1px 4px}
      .calendar-legend{flex-wrap:wrap;gap:8px}
    }

    /* ============== SIDEBAR RESIZE HANDLE ============== */
    .sidebar{position:relative}
    .sidebar-resize-handle{
      position:absolute;top:0;right:-3px;bottom:0;width:6px;
      cursor:col-resize;z-index:10;background:transparent;
      transition:background .15s;
    }
    .sidebar-resize-handle:hover,
    .sidebar-resize-handle.resizing{background:var(--accent-soft)}
    body.resizing-sidebar{cursor:col-resize!important;user-select:none}
    body.resizing-sidebar *{cursor:col-resize!important;pointer-events:none}
    body.resizing-sidebar .sidebar-resize-handle{pointer-events:auto}

    /* ============== FULL-WIDTH PAGE MODE ============== */
    .page-editor.full-width{
      max-width:none;
      padding-left:clamp(28px, 3.5vw, 80px);
      padding-right:clamp(28px, 3.5vw, 80px);
    }

    /* ============== VIEW TABS (saved views) ============== */
    .view-tabs{
      display:flex;align-items:center;gap:0;
      padding:2px 0 0;margin-bottom:0;
      border-bottom:1px solid var(--divider);
      overflow-x:auto;flex-shrink:0;
      scrollbar-width:none;
    }
    .view-tabs::-webkit-scrollbar{display:none}
    .view-tab{
      display:inline-flex;align-items:center;gap:6px;
      padding:7px 11px 8px;border-radius:0;
      font-size:13px;font-weight:500;color:var(--text-muted);
      border-bottom:2px solid transparent;margin-bottom:-1px;
      white-space:nowrap;transition:color .12s,border-color .12s,background .1s;
    }
    .view-tab:hover{color:var(--text);background:var(--bg-hover)}
    .view-tab.active{color:var(--text);border-bottom-color:var(--accent)}
    .view-tab .view-tab-icon{font-size:13px;line-height:1}
    .view-tab.add-view{color:var(--text-faint);font-weight:400}
    .view-tab.add-view:hover{color:var(--text)}
    .view-tab-actions{display:none;margin-left:2px;gap:0;align-items:center}
    .view-tab.active .view-tab-actions{display:inline-flex}
    .view-tab-action-btn{
      width:18px;height:18px;border-radius:var(--radius-sm);
      color:var(--text-faint);
      display:inline-flex;align-items:center;justify-content:center;
    }
    .view-tab-action-btn:hover{background:rgba(255,255,255,0.1);color:var(--text)}
    .view-tab-action-btn svg{width:11px;height:11px}
    .view-tab-update{
      display:inline-flex;align-items:center;gap:4px;
      padding:5px 10px;margin-left:6px;
      border-radius:var(--radius);font-size:12px;
      color:var(--accent);background:var(--accent-faint);
      transition:background .1s;font-weight:500;
    }
    .view-tab-update:hover{background:var(--accent-soft)}
    .view-tab-update svg{width:11px;height:11px}

    /* ============== NEW VIEW POPOVER ============== */
    .nv-popover{
      position:absolute;top:calc(100% + 4px);
      background:var(--bg-elevated);border:1px solid var(--border);
      border-radius:var(--radius-lg);box-shadow:var(--shadow);
      z-index:200;min-width:280px;padding:6px;
      animation:slideUp .12s ease-out;
    }
    .nv-section{padding:4px 4px 6px;border-bottom:1px solid var(--divider)}
    .nv-section:last-child{border-bottom:none;padding-bottom:4px}
    .nv-section-label{
      font-size:10.5px;color:var(--text-faint);font-weight:500;
      padding:6px 8px 4px;text-transform:uppercase;letter-spacing:0.04em;
    }
    .nv-option{
      display:flex;align-items:center;gap:10px;
      padding:7px 9px;border-radius:var(--radius);
      width:100%;text-align:left;font-size:13px;
      cursor:pointer;transition:background .08s;color:var(--text);
    }
    .nv-option:hover{background:var(--bg-hover)}
    .nv-option-icon{
      width:24px;text-align:center;font-size:14px;
      color:var(--text-muted);flex-shrink:0;
    }
    .nv-option-body{flex:1;min-width:0}
    .nv-option-name{font-weight:500;font-size:13px;line-height:1.3}
    .nv-option-desc{font-size:11.5px;color:var(--text-faint);margin-top:1px;line-height:1.3}
  </style>
</head>
<body>

<!-- AUTH -->
<div class="auth-screen" id="authScreen">
  <div class="auth-card">
    <div class="auth-brand">Workspace</div>
    <div class="auth-tagline">Sign in to your team space</div>
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="signin">Sign in</button>
      <button class="auth-tab" data-tab="signup">Sign up</button>
    </div>
    <div id="authError" class="auth-error" hidden></div>
    <form id="authForm">
      <div class="field"><label>Email</label><input type="email" id="emailInput" required autocomplete="email"/></div>
      <div class="field"><label>Password</label><input type="password" id="passwordInput" required minlength="6" autocomplete="current-password"/></div>
      <button type="submit" class="btn-primary" id="authSubmit">Sign in</button>
    </form>
  </div>
</div>

<!-- APP -->
<div class="app" id="app" hidden>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-resize-handle" id="sidebarResizeHandle"></div>
    <div class="sidebar-header">
      <span class="brand">Workspace</span>
      <button class="icon-btn" id="closeSidebarBtn" title="Close sidebar (⌘\)" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="sidebar-search">
      <button class="sb-search-btn" id="sidebarSearchBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <span class="sb-search-label">Search…</span>
        <kbd>⌘K</kbd>
      </button>
    </div>
    <div class="sidebar-nav">
      <button class="nav-item" data-sysview="tasks">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>
        <span class="nav-item-title">Tasks</span>
      </button>
      <button class="nav-item" data-sysview="recent">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
        <span class="nav-item-title">Recent</span>
      </button>
      <button class="nav-item" data-sysview="archive">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="5" rx="1"/><path d="M4 9v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9"/><line x1="10" y1="13" x2="14" y2="13"/></svg></span>
        <span class="nav-item-title">Archive</span>
      </button>
      <button class="nav-item" data-sysview="activity">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></span>
        <span class="nav-item-title">Activity</span>
      </button>
    </div>
    <div class="sidebar-section" id="pinnedSection" hidden>
      <div class="sidebar-section-label"><span>Pinned</span></div>
      <div id="pinnedList"></div>
    </div>
    <div class="sidebar-section pages-section-wrap">
      <div class="sidebar-section-label">
        <span>Pages</span>
        <div class="label-actions">

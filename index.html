  function renderTasksView() {
    contentBody.innerHTML = `
      <div class="tasks-view">
        <div class="tasks-header">
          <div class="view-toggle">
            <button data-view="kanban" class="${state.taskView === 'kanban' ? 'active' : ''}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="6" height="18" rx="1"/><rect x="11" y="3" width="6" height="12" rx="1"/></svg>
              Board
            </button>
            <button data-view="list" class="${state.taskView === 'list' ? 'active' : ''}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
              List
            </button>
          </div>
          <button class="add-task-btn" id="addTaskBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            New task
          </button>
        </div>
        <div id="tasksBody" style="flex:1; overflow:hidden; display:flex; flex-direction:column;"></div>
      </div>
    `;
    document.querySelectorAll('.view-toggle button').forEach(b => {
      b.addEventListener('click', () => { state.taskView = b.dataset.view; renderTasksView(); });
    });
    $('addTaskBtn').addEventListener('click', () => createTask());
    const body = $('tasksBody');
    if (state.taskView === 'kanban') renderKanban(body);
    else renderTaskList(body);
  }

  function renderKanban(container) {
    const columns = [
      { key: 'todo', label: 'To do' },
      { key: 'doing', label: 'In progress' },
      { key: 'done', label: 'Done' },
    ];
    container.className = 'kanban';
    container.innerHTML = '';
    columns.forEach(col => {
      const colTasks = state.tasks.filter(t => t.status === col.key);
      const colEl = document.createElement('div');
      colEl.className = 'kanban-column';
      colEl.dataset.status = col.key;
      colEl.innerHTML = `
        <div class="column-header">
          <span class="column-title">${col.label}</span>
          <span class="column-count">${colTasks.length}</span>
        </div>
        <div class="column-cards"></div>
      `;
      const cardsEl = colEl.querySelector('.column-cards');
      if (colTasks.length === 0) {
        const e = document.createElement('div');
        e.className = 'empty-state';
        e.innerHTML = `<span class="empty-icon">∅</span> No tasks here yet`;
        cardsEl.appendChild(e);
      } else {
        colTasks.forEach(task => cardsEl.appendChild(buildKanbanCard(task)));
      }
      colEl.addEventListener('dragover', (e) => { e.preventDefault(); colEl.classList.add('drag-over'); });
      colEl.addEventListener('dragleave', (e) => { if (!colEl.contains(e.relatedTarget)) colEl.classList.remove('drag-over'); });
      colEl.addEventListener('drop', (e) => {
        e.preventDefault(); colEl.classList.remove('drag-over');
        const taskId = e.dataTransfer.getData('text/plain');
        if (taskId) updateTask(taskId, { status: col.key });
      });
      container.appendChild(colEl);
    });
  }

  function buildKanbanCard(task) {
    const card = document.createElement('div');
    card.className = 'kanban-card';
    card.draggable = true;
    card.dataset.id = task.id;
    card.innerHTML = `
      <button class="card-delete-btn" title="Delete">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <textarea class="card-title-input" rows="1">${escapeHtml(task.title || '')}</textarea>
      <div class="card-footer">
        <select class="task-priority-pill pill-${task.priority || 'medium'}">
          <option value="low" ${task.priority==='low'?'selected':''}>Low</option>
          <option value="medium" ${task.priority==='medium'?'selected':''}>Medium</option>
          <option value="high" ${task.priority==='high'?'selected':''}>High</option>
        </select>
      </div>
    `;
    card.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text/plain', task.id);
      e.dataTransfer.effectAllowed = 'move';
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
    const titleInput = card.querySelector('.card-title-input');
    autoResize(titleInput);
    let timer;
    titleInput.addEventListener('input', () => {
      autoResize(titleInput);
      clearTimeout(timer);
      timer = setTimeout(() => updateTask(task.id, { title: titleInput.value }), 350);
    });
    titleInput.addEventListener('mousedown', (e) => e.stopPropagation());
    titleInput.addEventListener('focus', () => { card.draggable = false; });
    titleInput.addEventListener('blur', () => { card.draggable = true; });
    const prioritySelect = card.querySelector('.task-priority-pill');
    prioritySelect.addEventListener('change', () => updateTask(task.id, { priority: prioritySelect.value }));
    prioritySelect.addEventListener('mousedown', (e) => e.stopPropagation());
    card.querySelector('.card-delete-btn').addEventListener('click', (e) => {
      e.stopPropagation(); deleteTask(task.id);
    });
    return card;
  }

  function renderTaskList(container) {
    container.className = 'task-list';
    container.innerHTML = '';
    if (state.tasks.length === 0) {
      const e = document.createElement('div');
      e.className = 'empty-state';
      e.innerHTML = `<span class="empty-icon">∅</span> No tasks yet — click "New task" to add one.`;
      container.appendChild(e);
      return;
    }
    state.tasks.forEach(task => {
      const row = document.createElement('div');
      row.className = 'task-row';
      row.innerHTML = `
        <select class="task-status-pill pill-${task.status}">
          <option value="todo" ${task.status==='todo'?'selected':''}>To do</option>
          <option value="doing" ${task.status==='doing'?'selected':''}>In progress</option>
          <option value="done" ${task.status==='done'?'selected':''}>Done</option>
        </select>
        <input class="task-title-input" value="${escapeAttr(task.title || '')}" />
        <select class="task-priority-pill pill-${task.priority || 'medium'}">
          <option value="low" ${task.priority==='low'?'selected':''}>Low</option>
          <option value="medium" ${task.priority==='medium'?'selected':''}>Medium</option>
          <option value="high" ${task.priority==='high'?'selected':''}>High</option>
        </select>
        <button class="task-delete-btn" title="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
        </button>
      `;
      const statusSelect = row.querySelector('.task-status-pill');
      const prioritySelect = row.querySelector('.task-priority-pill');
      const titleInput = row.querySelector('.task-title-input');
      let timer;
      titleInput.addEventListener('input', () => {
        clearTimeout(timer);
        timer = setTimeout(() => updateTask(task.id, { title: titleInput.value }), 350);
      });
      statusSelect.addEventListener('change', () => updateTask(task.id, { status: statusSelect.value }));
      prioritySelect.addEventListener('change', () => updateTask(task.id, { priority: prioritySelect.value }));
      row.querySelector('.task-delete-btn').addEventListener('click', () => deleteTask(task.id));
      container.appendChild(row);
    });
  }

  // ============================================================
  // MODAL / TOAST
  // ============================================================
  function confirmModal(title, body, onConfirm) {
    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.innerHTML = `
      <div class="modal">
        <h3>${escapeHtml(title)}</h3>
        <p>${escapeHtml(body)}</p>
        <div class="modal-actions">
          <button class="btn-secondary" data-action="cancel">Cancel</button>
          <button class="btn-danger" data-action="confirm">Delete</button>
        </div>
      </div>
    `;
    document.body.appendChild(backdrop);
    backdrop.addEventListener('click', (e) => {
      if (e.target === backdrop || e.target.dataset.action === 'cancel') backdrop.remove();
      else if (e.target.dataset.action === 'confirm') { backdrop.remove(); onConfirm(); }
    });
  }

  function toast(msg) {
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2400);
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function escapeAttr(s) { return escapeHtml(s); }

  // ============================================================
  // BACKUP / RESTORE
  // ============================================================
  $('exportBtn').addEventListener('click', exportBackup);
  $('importBtn').addEventListener('click', () => $('importFileInput').click());
  $('importFileInput').addEventListener('change', importBackup);

  async function exportBackup() {
    try {
      const pages = [];
      for (const p of state.pages) {
        const blocksSnap = await getDocs(
          query(collection(db, 'workspace', 'main', 'pages', p.id, 'blocks'), orderBy('order'))
        );
        pages.push({ ...p, blocks: blocksSnap.docs.map(d => ({ id: d.id, ...d.data() })) });
      }
      const data = {
        exportedAt: new Date().toISOString(), exportedBy: state.user.email,
        version: 2, pages, tasks: state.tasks,
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `workspace-backup-${new Date().toISOString().slice(0,10)}.json`;
      a.click(); URL.revokeObjectURL(url);
      toast('Backup downloaded');
    } catch (err) { console.error(err); toast('Backup failed — check console'); }
  }

  async function importBackup(e) {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!data.pages || !data.tasks) throw new Error('Invalid backup file');
      confirmModal(
        'Import this backup?',
        `This will ADD ${data.pages.length} pages and ${data.tasks.length} tasks. Existing data will not be deleted.`,
        async () => {
          const batch = writeBatch(db);
          data.tasks.forEach(t => {
            const ref = doc(collection(db, 'workspace', 'main', 'tasks'));
            const { id, ...rest } = t;
            batch.set(ref, { ...rest, importedAt: serverTimestamp() });
          });
          await batch.commit();
          for (const p of data.pages) {
            const { id, blocks, ...pageData } = p;
            const pageRef = await addDoc(collection(db, 'workspace', 'main', 'pages'), {
              ...pageData, importedAt: serverTimestamp(),
            });
            if (Array.isArray(blocks) && blocks.length > 0) {
              const blockBatch = writeBatch(db);
              blocks.forEach(b => {
                const bRef = doc(collection(db, 'workspace', 'main', 'pages', pageRef.id, 'blocks'));
                const { id: bid, ...brest } = b;
                blockBatch.set(bRef, brest);
              });
              await blockBatch.commit();
            }
          }
          toast(`Imported ${data.pages.length} pages and ${data.tasks.length} tasks`);
        }
      );
    } catch (err) { console.error(err); toast('Import failed — invalid file'); }
    finally { e.target.value = ''; }
  }

    sidebar.classList.add('open'); sidebarBackdrop.classList.add('open');

  function closeSidebarOnMobile() {
    if (window.innerWidth <= 768) {
      sidebar.classList.remove('open'); sidebarBackdrop.classList.remove('open');
